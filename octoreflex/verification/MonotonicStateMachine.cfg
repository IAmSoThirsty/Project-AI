---- CONFIG MonotonicStateMachine ----
\* TLA+ model checking configuration for OctoReflex state machine

CONSTANTS
  PIDs = {p1, p2, p3}
  MaxTransitions = 20

SPECIFICATION Spec

INVARIANTS
  TypeInvariant
  MonotonicityInvariant
  TerminalInvariant
  DecaySafetyInvariant
  NoNegativeStatesInvariant
  BoundedStatesInvariant

PROPERTIES
  EventuallyTerminalPersists

\* Enable symmetry reduction (PIDs are symmetric)
SYMMETRY Permutations(PIDs)

\* Check for deadlocks
CHECK_DEADLOCK TRUE

====
