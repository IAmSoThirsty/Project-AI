server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: info

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    backoff_config:
      min_period: 100ms
      max_period: 10s
      max_retries: 10
    timeout: 10s

scrape_configs:
  # System logs
  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: varlogs
          __path__: /var/log/*.log

  # Docker container logs
  - job_name: containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'stream'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'
    pipeline_stages:
      - docker: {}
      - regex:
          expression: '^(?P<timestamp>\S+) (?P<level>\S+) (?P<message>.*)$'
      - labels:
          level:
          timestamp:
      - timestamp:
          source: timestamp
          format: RFC3339

  # Temporal logs
  - job_name: temporal
    static_configs:
      - targets:
          - localhost
        labels:
          job: temporal
          component: frontend
          __path__: /var/log/temporal/frontend*.log
      - targets:
          - localhost
        labels:
          job: temporal
          component: worker
          __path__: /var/log/temporal/worker*.log
      - targets:
          - localhost
        labels:
          job: temporal
          component: history
          __path__: /var/log/temporal/history*.log
      - targets:
          - localhost
        labels:
          job: temporal
          component: matching
          __path__: /var/log/temporal/matching*.log
    pipeline_stages:
      - json:
          expressions:
            timestamp: ts
            level: level
            logger: logger
            message: msg
            workflow_id: wf_id
            run_id: run_id
      - labels:
          level:
          logger:
          workflow_id:
          run_id:
      - timestamp:
          source: timestamp
          format: RFC3339Nano

  # Agent logs
  - job_name: agents
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
            - agents
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_component]
        action: keep
        regex: agent
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: pod
      - source_labels: [__meta_kubernetes_namespace]
        target_label: namespace
      - source_labels: [__meta_kubernetes_pod_label_agent_id]
        target_label: agent_id
      - source_labels: [__meta_kubernetes_pod_label_region]
        target_label: region
      - source_labels: [__meta_kubernetes_pod_container_name]
        target_label: container
      - replacement: /var/log/pods/*$1/*.log
        separator: /
        source_labels:
          - __meta_kubernetes_pod_uid
          - __meta_kubernetes_pod_container_name
        target_label: __path__
    pipeline_stages:
      - cri: {}
      - json:
          expressions:
            level: level
            message: msg
            trace_id: trace_id
            span_id: span_id
      - labels:
          level:
          trace_id:
          span_id:

  # Application logs with structured logging
  - job_name: application
    static_configs:
      - targets:
          - localhost
        labels:
          job: application
          __path__: /var/log/app/*.json
    pipeline_stages:
      - json:
          expressions:
            timestamp: time
            level: level
            message: message
            service: service
            trace_id: trace_id
            span_id: span_id
            user_id: user_id
            request_id: request_id
      - labels:
          level:
          service:
          trace_id:
          span_id:
      - timestamp:
          source: timestamp
          format: RFC3339
      - output:
          source: message

  # Error logs with high priority
  - job_name: errors
    static_configs:
      - targets:
          - localhost
        labels:
          job: errors
          severity: high
          __path__: /var/log/errors/*.log
    pipeline_stages:
      - multiline:
          firstline: '^\d{4}-\d{2}-\d{2}'
          max_lines: 128
      - regex:
          expression: '^(?P<timestamp>\S+)\s+(?P<level>\S+)\s+(?P<message>.*)'
      - labels:
          level:
      - timestamp:
          source: timestamp
          format: RFC3339
      - match:
          selector: '{job="errors"} |= "ERROR" or |= "FATAL"'
          stages:
            - labels:
                alert: "true"
