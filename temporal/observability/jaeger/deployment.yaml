apiVersion: v1
kind: Namespace
metadata:
  name: observability
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger-collector
  namespace: observability
  labels:
    app: jaeger
    component: collector
spec:
  type: ClusterIP
  ports:
    - name: jaeger-collector-http
      port: 14268
      protocol: TCP
      targetPort: 14268
    - name: jaeger-collector-grpc
      port: 14250
      protocol: TCP
      targetPort: 14250
    - name: jaeger-collector-zipkin
      port: 9411
      protocol: TCP
      targetPort: 9411
  selector:
    app: jaeger
    component: collector
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger-query
  namespace: observability
  labels:
    app: jaeger
    component: query
spec:
  type: LoadBalancer
  ports:
    - name: jaeger-query-http
      port: 16686
      protocol: TCP
      targetPort: 16686
  selector:
    app: jaeger
    component: query
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger-agent
  namespace: observability
  labels:
    app: jaeger
    component: agent
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: jaeger-agent-compact
      port: 6831
      protocol: UDP
      targetPort: 6831
    - name: jaeger-agent-binary
      port: 6832
      protocol: UDP
      targetPort: 6832
    - name: jaeger-agent-configs
      port: 5778
      protocol: TCP
      targetPort: 5778
  selector:
    app: jaeger
    component: agent
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger-collector
  namespace: observability
  labels:
    app: jaeger
    component: collector
spec:
  replicas: 3
  selector:
    matchLabels:
      app: jaeger
      component: collector
  template:
    metadata:
      labels:
        app: jaeger
        component: collector
    spec:
      containers:
        - name: jaeger-collector
          image: jaegertracing/jaeger-collector:1.53
          args:
            - "--collector.zipkin.host-port=:9411"
            - "--collector.otlp.enabled=true"
            - "--es.server-urls=http://elasticsearch:9200"
            - "--es.num-shards=3"
            - "--es.num-replicas=1"
          env:
            - name: SPAN_STORAGE_TYPE
              value: elasticsearch
          ports:
            - containerPort: 14268
              protocol: TCP
            - containerPort: 14250
              protocol: TCP
            - containerPort: 9411
              protocol: TCP
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /
              port: 14269
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 14269
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger-query
  namespace: observability
  labels:
    app: jaeger
    component: query
spec:
  replicas: 2
  selector:
    matchLabels:
      app: jaeger
      component: query
  template:
    metadata:
      labels:
        app: jaeger
        component: query
    spec:
      containers:
        - name: jaeger-query
          image: jaegertracing/jaeger-query:1.53
          args:
            - "--es.server-urls=http://elasticsearch:9200"
            - "--query.base-path=/jaeger"
          env:
            - name: SPAN_STORAGE_TYPE
              value: elasticsearch
          ports:
            - containerPort: 16686
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /
              port: 16687
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 16687
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: jaeger-agent
  namespace: observability
  labels:
    app: jaeger
    component: agent
spec:
  selector:
    matchLabels:
      app: jaeger
      component: agent
  template:
    metadata:
      labels:
        app: jaeger
        component: agent
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: jaeger-agent
          image: jaegertracing/jaeger-agent:1.53
          args:
            - "--reporter.grpc.host-port=jaeger-collector:14250"
            - "--processor.jaeger-compact.server-host-port=:6831"
            - "--processor.jaeger-binary.server-host-port=:6832"
            - "--processor.zipkin-compact.server-host-port=:5775"
          ports:
            - containerPort: 6831
              protocol: UDP
              hostPort: 6831
            - containerPort: 6832
              protocol: UDP
              hostPort: 6832
            - containerPort: 5778
              protocol: TCP
              hostPort: 5778
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: jaeger-configuration
  namespace: observability
data:
  sampling-strategies.json: |
    {
      "service_strategies": [
        {
          "service": "temporal-frontend",
          "type": "probabilistic",
          "param": 1.0
        },
        {
          "service": "temporal-worker",
          "type": "probabilistic",
          "param": 0.1
        }
      ],
      "default_strategy": {
        "type": "probabilistic",
        "param": 0.01
      }
    }
