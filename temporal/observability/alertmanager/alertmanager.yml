global:
  resolve_timeout: 5m
  slack_api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
  pagerduty_url: 'https://events.pagerduty.com/v2/enqueue'

# Templates for notifications
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# Root route for all alerts
route:
  receiver: 'default'
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h
  
  routes:
    # Critical alerts - immediate notification
    - match:
        severity: critical
      receiver: 'critical-alerts'
      group_wait: 0s
      group_interval: 5m
      repeat_interval: 4h
      continue: true

    # Agent-specific alerts
    - match:
        component: agent
      receiver: 'agent-team'
      group_by: ['alertname', 'region', 'agent_id']
      group_wait: 30s
      repeat_interval: 8h

    # Workflow alerts
    - match:
        component: workflow
      receiver: 'workflow-team'
      group_by: ['alertname', 'workflow_type']
      group_wait: 30s
      repeat_interval: 8h

    # Infrastructure alerts
    - match:
        component: infrastructure
      receiver: 'infrastructure-team'
      group_by: ['alertname', 'instance']
      group_wait: 1m
      repeat_interval: 6h

    # Network alerts
    - match:
        component: network
      receiver: 'network-team'
      group_by: ['alertname', 'region']
      group_wait: 30s
      repeat_interval: 4h

# Inhibition rules - suppress alerts when others are firing
inhibit_rules:
  # If agent is down, suppress all other alerts from that agent
  - source_match:
      alertname: AgentDown
    target_match_re:
      alertname: (AgentHighCPU|AgentHighMemory|HighTaskQueueDepth)
    equal: ['agent_id']

  # If there's a critical alert, suppress warnings
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['alertname', 'instance']

  # If node is down, suppress container alerts
  - source_match:
      alertname: NodeDown
    target_match_re:
      alertname: (ContainerHighCPU|ContainerHighMemory|ContainerRestarting)
    equal: ['instance']

  # If network has issues, suppress latency alerts
  - source_match_re:
      alertname: (HighNetworkErrors|NetworkBandwidthSaturation)
    target_match:
      alertname: AgentNetworkLatency
    equal: ['instance']

# Receivers - notification channels
receivers:
  - name: 'default'
    slack_configs:
      - channel: '#observability-alerts'
        title: 'Alert: {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
        send_resolved: true

  - name: 'critical-alerts'
    pagerduty_configs:
      - service_key: 'YOUR_PAGERDUTY_SERVICE_KEY'
        description: '{{ .GroupLabels.alertname }} - {{ .CommonAnnotations.summary }}'
    slack_configs:
      - channel: '#critical-alerts'
        title: ':rotating_light: CRITICAL: {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
        color: 'danger'
        send_resolved: true
    webhook_configs:
      - url: 'http://alertmanager-webhook:8080/webhook'
        send_resolved: true

  - name: 'agent-team'
    slack_configs:
      - channel: '#agent-alerts'
        title: 'Agent Alert: {{ .GroupLabels.alertname }}'
        text: |
          *Summary:* {{ .CommonAnnotations.summary }}
          *Region:* {{ .GroupLabels.region }}
          {{ range .Alerts }}
          *Agent:* {{ .Labels.agent_id }}
          *Description:* {{ .Annotations.description }}
          {{ end }}
        send_resolved: true
    email_configs:
      - to: 'agent-team@example.com'
        from: 'alertmanager@example.com'
        smarthost: 'smtp.example.com:587'
        auth_username: 'alertmanager@example.com'
        auth_password: 'YOUR_EMAIL_PASSWORD'
        headers:
          Subject: 'Agent Alert: {{ .GroupLabels.alertname }}'

  - name: 'workflow-team'
    slack_configs:
      - channel: '#workflow-alerts'
        title: 'Workflow Alert: {{ .GroupLabels.alertname }}'
        text: |
          *Summary:* {{ .CommonAnnotations.summary }}
          *Workflow Type:* {{ .GroupLabels.workflow_type }}
          {{ range .Alerts }}
          *Description:* {{ .Annotations.description }}
          {{ end }}
        send_resolved: true

  - name: 'infrastructure-team'
    slack_configs:
      - channel: '#infrastructure-alerts'
        title: 'Infrastructure Alert: {{ .GroupLabels.alertname }}'
        text: |
          *Summary:* {{ .CommonAnnotations.summary }}
          *Instance:* {{ .GroupLabels.instance }}
          {{ range .Alerts }}
          *Description:* {{ .Annotations.description }}
          {{ end }}
        send_resolved: true
    opsgenie_configs:
      - api_key: 'YOUR_OPSGENIE_API_KEY'
        message: '{{ .GroupLabels.alertname }} - {{ .CommonAnnotations.summary }}'
        description: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
        priority: '{{ if eq .GroupLabels.severity "critical" }}P1{{ else }}P3{{ end }}'

  - name: 'network-team'
    slack_configs:
      - channel: '#network-alerts'
        title: 'Network Alert: {{ .GroupLabels.alertname }}'
        text: |
          *Summary:* {{ .CommonAnnotations.summary }}
          *Region:* {{ .GroupLabels.region }}
          {{ range .Alerts }}
          *Description:* {{ .Annotations.description }}
          {{ end }}
        send_resolved: true
