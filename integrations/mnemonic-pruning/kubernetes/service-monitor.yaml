apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: Mnemonic Pruning
  namespace: default
  labels:
    app: Mnemonic Pruning
    release: prometheus
spec:
  selector:
    matchLabels:
      app: Mnemonic Pruning
  endpoints:
  - port: http
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s
