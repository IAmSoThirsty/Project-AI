apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: Logic Sanitizer
  namespace: default
  labels:
    app: Logic Sanitizer
    release: prometheus
spec:
  selector:
    matchLabels:
      app: Logic Sanitizer
  endpoints:
  - port: http
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s
