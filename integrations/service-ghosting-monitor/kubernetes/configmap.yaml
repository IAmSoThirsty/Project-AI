apiVersion: v1
kind: ConfigMap
metadata:
  name: Service Ghosting Monitor-config
  namespace: default
data:
  SERVICE_NAME: "Service Ghosting Monitor"
  VERSION: "1.0.0"
  PORT: "8000"
  API_PREFIX: "/api/v1"
  LOG_LEVEL: "INFO"
  ENABLE_METRICS: "true"
  ENABLE_TRACING: "true"
  RATE_LIMIT_PER_MINUTE: "100"
  RATE_LIMIT_BURST: "200"
