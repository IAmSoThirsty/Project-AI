apiVersion: v1
kind: Service
metadata:
  name: Temporal Dissonance Bridge
  namespace: default
  labels:
    app: Temporal Dissonance Bridge
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: Temporal Dissonance Bridge
  sessionAffinity: None
