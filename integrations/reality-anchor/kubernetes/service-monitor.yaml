apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: Reality Anchor
  namespace: default
  labels:
    app: Reality Anchor
    release: prometheus
spec:
  selector:
    matchLabels:
      app: Reality Anchor
  endpoints:
  - port: http
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s
