apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: Knowledge Decay Service
  namespace: default
  labels:
    app: Knowledge Decay Service
    release: prometheus
spec:
  selector:
    matchLabels:
      app: Knowledge Decay Service
  endpoints:
  - port: http
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s
