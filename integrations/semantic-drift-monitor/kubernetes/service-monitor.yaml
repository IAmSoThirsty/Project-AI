apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: Semantic Drift Monitor
  namespace: default
  labels:
    app: Semantic Drift Monitor
    release: prometheus
spec:
  selector:
    matchLabels:
      app: Semantic Drift Monitor
  endpoints:
  - port: http
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s
