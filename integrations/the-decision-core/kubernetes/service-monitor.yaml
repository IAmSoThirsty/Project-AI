apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: The Decision Core
  namespace: default
  labels:
    app: The Decision Core
    release: prometheus
spec:
  selector:
    matchLabels:
      app: The Decision Core
  endpoints:
  - port: http
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s
