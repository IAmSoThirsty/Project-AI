apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: Service mesh integration
  namespace: default
  labels:
    app: Service mesh integration
    release: prometheus
spec:
  selector:
    matchLabels:
      app: Service mesh integration
  endpoints:
  - port: http
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s
