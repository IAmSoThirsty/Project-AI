apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: The Temporal Clock
  namespace: default
  labels:
    app: The Temporal Clock
    release: prometheus
spec:
  selector:
    matchLabels:
      app: The Temporal Clock
  endpoints:
  - port: http
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s
