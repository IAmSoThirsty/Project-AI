apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: Cross-Domain Synthesis Service
  namespace: default
  labels:
    app: Cross-Domain Synthesis Service
    release: prometheus
spec:
  selector:
    matchLabels:
      app: Cross-Domain Synthesis Service
  endpoints:
  - port: http
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s
