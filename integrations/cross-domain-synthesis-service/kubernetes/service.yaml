apiVersion: v1
kind: Service
metadata:
  name: Cross-Domain Synthesis Service
  namespace: default
  labels:
    app: Cross-Domain Synthesis Service
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: Cross-Domain Synthesis Service
  sessionAffinity: None
