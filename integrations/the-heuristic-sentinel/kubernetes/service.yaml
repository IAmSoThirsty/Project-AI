apiVersion: v1
kind: Service
metadata:
  name: The Heuristic Sentinel
  namespace: default
  labels:
    app: The Heuristic Sentinel
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: The Heuristic Sentinel
  sessionAffinity: None
