apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: The Heuristic Sentinel
  namespace: default
  labels:
    app: The Heuristic Sentinel
    release: prometheus
spec:
  selector:
    matchLabels:
      app: The Heuristic Sentinel
  endpoints:
  - port: http
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s
