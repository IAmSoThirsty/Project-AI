apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: Cognitive Mirror
  namespace: default
  labels:
    app: Cognitive Mirror
    release: prometheus
spec:
  selector:
    matchLabels:
      app: Cognitive Mirror
  endpoints:
  - port: http
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s
