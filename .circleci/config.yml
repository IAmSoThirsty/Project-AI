version: '2.1'

orbs:
  slack: circleci/slack@6.1.3

executors:
  python-node:
    docker:
      - image: cimg/python:3.11-node
    resource_class: medium
  deploy-executor:
    docker:
      - image: cimg/base:stable
    resource_class: small

commands:
  install_python_dependencies:
    description: Install Python dependencies with cache restore/save.
    steps:
      - restore_cache:
          keys:
            - v1-pip-{{ arch }}-{{ checksum "requirements.txt" }}
            - v1-pip-{{ arch }}-
      - run:
          name: Install Python dependencies
          command: |
            python -m pip install --upgrade pip
            pip install -r requirements.txt
            if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
            if [ -f requirements-optional.txt ]; then pip install -r requirements-optional.txt; fi
            pip install pytest pytest-cov ruff pip-audit build
            pip check
      - save_cache:
          key: v1-pip-{{ arch }}-{{ checksum "requirements.txt" }}
          paths:
            - ~/.cache/pip

  install_node_dependencies:
    description: Install Node dependencies with cache restore/save.
    steps:
      - restore_cache:
          keys:
            - v1-npm-{{ arch }}-{{ checksum "package-lock.json" }}
            - v1-npm-{{ arch }}-
      - run:
          name: Install Node dependencies
          command: |
            npm ci --include=dev
            npm ls --depth=0
      - save_cache:
          key: v1-npm-{{ arch }}-{{ checksum "package-lock.json" }}
          paths:
            - ~/.npm

  install_deploy_tooling:
    description: Install deployment and cluster tooling used by release jobs.
    steps:
      - run:
          name: Install deployment tooling
          command: |
            sudo apt-get update
            sudo apt-get install -y curl jq ca-certificates

            curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

            KUBECTL_VERSION="$(curl -fsSL https://dl.k8s.io/release/stable.txt)"
            curl -fsSLo kubectl "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
            chmod +x kubectl
            sudo mv kubectl /usr/local/bin/kubectl

            helm version --short
            kubectl version --client=true

  maybe_skip_docs_only:
    description: Halt the current job when only docs/markdown changed.
    steps:
      - run:
          name: Detect docs-only changes
          command: |
            if [ -n "${CIRCLE_TAG}" ]; then
              echo "Tag pipeline; not skipping."
              exit 0
            fi

            BASE_BRANCH="main"
            git fetch origin "${BASE_BRANCH}" --depth=1 || true

            CHANGED_FILES=$(git diff --name-only "origin/${BASE_BRANCH}...HEAD" || true)
            if [ -z "${CHANGED_FILES}" ]; then
              echo "No diff against ${BASE_BRANCH}; continuing."
              exit 0
            fi

            NON_DOC_CHANGES=$(echo "${CHANGED_FILES}" | grep -Ev '^(docs/|README\.md$|CHANGELOG\.md$|.*\.md$)' || true)
            if [ -z "${NON_DOC_CHANGES}" ]; then
              echo "Only docs changed; halting this job."
              circleci-agent step halt
            fi

  verify_dependency_lockfiles:
    description: Ensure dependency lock/manifests are deterministic and in sync.
    steps:
      - run:
          name: Verify npm lockfile consistency
          command: |
            if [ ! -f package-lock.json ]; then
              echo "package-lock.json not found; skipping npm lockfile consistency check."
              exit 0
            fi

            npm install --package-lock-only --ignore-scripts --no-audit --fund=false

            if ! git diff --quiet -- package-lock.json; then
              echo "package-lock.json is out of sync with package.json."
              echo "Run: npm install --package-lock-only"
              git --no-pager diff -- package-lock.json
              exit 1
            fi

      - run:
          name: Verify Python lockfile consistency
          command: |
            if [ ! -f requirements.in ] || [ ! -f requirements.lock ]; then
              echo "requirements.in or requirements.lock not found; skipping Python lockfile consistency check."
              exit 0
            fi

            python -m pip install --upgrade pip
            pip install pip-tools

            pip-compile --quiet --allow-unsafe --generate-hashes --output-file=requirements.lock requirements.in

            if ! git diff --quiet -- requirements.lock; then
              echo "requirements.lock is out of sync with requirements.in/requirements.txt."
              echo "Run: pip-compile --allow-unsafe --generate-hashes --output-file=requirements.lock requirements.in"
              git --no-pager diff -- requirements.lock
              exit 1
            fi

jobs:
  dependency_lock_guard:
    executor: python-node
    steps:
      - checkout
      - maybe_skip_docs_only
      - install_node_dependencies
      - verify_dependency_lockfiles

  container_image_check:
    executor: deploy-executor
    steps:
      - checkout
      - setup_remote_docker:
          version: default
      - run:
          name: Verify container images are pullable
          command: |
            COMPOSE_FILES=$(ls docker-compose*.yml 2>/dev/null || true)
            if [ -z "${COMPOSE_FILES}" ]; then
              echo "No docker-compose files found."
              exit 0
            fi

            IMAGES=$(grep -hE '^[[:space:]]*image:[[:space:]]*' ${COMPOSE_FILES} \
              | sed -E 's/^[[:space:]]*image:[[:space:]]*//; s/[[:space:]]+#.*$//' \
              | tr -d '"' \
              | sort -u)

            if [ -z "${IMAGES}" ]; then
              echo "No container images declared in compose files."
              exit 0
            fi

            echo "Verifying the following images can be pulled:"
            echo "${IMAGES}"

            for image in ${IMAGES}; do
              echo "Pulling ${image}"
              docker pull "${image}"
            done

  lint:
    executor: python-node
    steps:
      - checkout
      - maybe_skip_docs_only
      - install_python_dependencies
      - install_node_dependencies
      - run:
          name: Run linters
          command: |
            npm run lint
            npm run lint:markdown

  test:
    executor: python-node
    parallelism: 2
    steps:
      - checkout
      - maybe_skip_docs_only
      - install_python_dependencies
      - install_node_dependencies
      - run:
          name: Run JavaScript tests
          command: npm run test:js
      - run:
          name: Run split Python tests
          command: |
            mkdir -p test-results
            circleci tests glob "tests/test_*.py" \
              | circleci tests run \
                  --command="xargs pytest -q --junitxml=test-results/junit-${CIRCLE_NODE_INDEX}.xml" \
                  --split-by=timings \
                  --timings-type=name
      - store_test_results:
          path: test-results
      - store_artifacts:
          path: test-results

  security_scan:
    executor: python-node
    steps:
      - checkout
      - maybe_skip_docs_only
      - install_python_dependencies
      - run:
          name: Python dependency vulnerability scan
          command: pip-audit -r requirements.txt

  build_package:
    executor: python-node
    steps:
      - checkout
      - maybe_skip_docs_only
      - install_python_dependencies
      - run:
          name: Build Python distribution artifacts
          command: python -m build
      - persist_to_workspace:
          root: .
          paths:
            - dist
      - store_artifacts:
          path: dist

  deploy_staging:
    executor: deploy-executor
    steps:
      - checkout
      - attach_workspace:
          at: .
      - install_deploy_tooling
      - run:
          name: Deploy to staging
          command: |
            echo "Deploying to staging..."
            echo "Insert staging deploy command here (helm/terraform/kubectl)."
      - slack/notify:
          event: fail
          mentions: '@EngineeringTeam'
          template: basic_fail_1
      - slack/notify:
          event: pass
          template: success_tagged_deploy_1

  deploy_production:
    executor: deploy-executor
    steps:
      - checkout
      - attach_workspace:
          at: .
      - install_deploy_tooling
      - run:
          name: Deploy to production
          command: |
            echo "Deploying to production..."
            echo "Insert production deploy command here (helm/terraform/kubectl)."
      - slack/notify:
          event: fail
          mentions: '@EngineeringTeam'
          template: basic_fail_1
      - slack/notify:
          event: pass
          template: success_tagged_deploy_1

  rollback_production:
    executor: deploy-executor
    steps:
      - checkout
      - run:
          name: Roll back production deploy
          command: |
            echo "Rolling back production deployment..."
            echo "Insert rollback command here (helm rollback, etc.)."
      - slack/notify:
          event: always
          template: basic_on_hold_1

workflows:
  commit-ci:
    jobs:
      - lint:
          filters:
            branches:
              only: /.*/
            tags:
              ignore: /.*/
      - test:
          requires:
            - lint
          filters:
            branches:
              only: /.*/
            tags:
              ignore: /.*/
      - security_scan:
          requires:
            - lint
          filters:
            branches:
              only: /.*/
            tags:
              ignore: /.*/
      - container_image_check:
          requires:
            - lint
          filters:
            branches:
              only: /.*/
            tags:
              ignore: /.*/
      - dependency_lock_guard:
          requires:
            - lint
          filters:
            branches:
              only: /.*/
            tags:
              ignore: /.*/
      - build_package:
          requires:
            - test
            - security_scan
            - container_image_check
            - dependency_lock_guard
          filters:
            branches:
              only:
                - main
            tags:
              ignore: /.*/

  release-on-tag:
    jobs:
      - lint:
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
      - test:
          requires:
            - lint
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
      - security_scan:
          requires:
            - lint
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
      - container_image_check:
          requires:
            - lint
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
      - dependency_lock_guard:
          requires:
            - lint
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
      - build_package:
          requires:
            - test
            - security_scan
            - container_image_check
            - dependency_lock_guard
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
      - slack/on-hold:
          context: slack-secrets
          requires:
            - build_package
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
      - approve_production:
          type: approval
          requires:
            - build_package
            - slack/on-hold
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
      - deploy_staging:
          context:
            - slack-secrets
            - staging-deploy-secrets
          requires:
            - approve_production
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
      - deploy_production:
          context:
            - slack-secrets
            - production-deploy-secrets
          requires:
            - deploy_staging
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
      - approve_rollback:
          type: approval
          requires:
            - deploy_production
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
      - rollback_production:
          context:
            - slack-secrets
            - production-deploy-secrets
          requires:
            - approve_rollback
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/

  nightly-quality:
    triggers:
      - schedule:
          cron: "0 2 * * *"
          filters:
            branches:
              only:
                - main
    jobs:
      - lint
      - test:
          requires:
            - lint
      - security_scan:
          requires:
            - lint
      - dependency_lock_guard:
          requires:
            - lint
