# Pytest configuration for DAILY tests (Monday-Saturday)
# Excludes weekly stress tests

[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Exclude weekly stress test files
norecursedirs = .git .venv node_modules __pycache__

# Explicitly ignore weekly stress tests
addopts = 
    -v
    --strict-markers
    --ignore=tests/test_four_laws_1000_deterministic.py
    --ignore=tests/test_four_laws_1000_property_based.py
    --ignore=tests/test_four_laws_1000_disallowed_high_level.py
    --ignore=tests/test_four_laws_1000_redacted_procedural_attempts.py

markers =
    weekly: Weekly stress tests (1000-scenario constitutional tests)
    daily: Daily regression tests (default)
    hourly: Fast smoke tests for hourly rotation
    governance: Governance and constitutional tests
    security: Security and attack simulation tests
    kernel: Core kernel and intelligence tests
    tarl: TARL orchestration tests
    psia: PSIA tests
    web: Web backend/frontend/API tests
    temporal: Temporal system tests
    unit: Unit tests
    integration: Integration tests
    load: Load tests
    chaos: Chaos tests
    soak: Soak tests
    slow: Slow-running tests
    timeout: Tests with custom timeout limits

filterwarnings =
    ignore::DeprecationWarning:passlib
