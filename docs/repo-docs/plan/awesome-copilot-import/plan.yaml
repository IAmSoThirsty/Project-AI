plan_id: awesome-copilot-import
objective: |
  Comprehensively import and integrate 200+ instructions, 150+ skills, and 100+ agents from awesome-copilot repository into Project-AI.
  Priority focus: Python ecosystem tools, governance/security assets, AI orchestration capabilities, and development workflow enhancements.
  Execution mode: autonomous with "extreme prejudice" (comprehensive coverage).
created_at: "2025-01-19T00:00:00Z"
created_by: gem-planner
status: pending
research_confidence: high
plan_metrics:
  wave_1_task_count: 3
  total_dependencies: 15
  risk_score: medium

tldr: |
  Four-phase DAG execution: (1) Run all three suggest-awesome-copilot skills in parallel to generate comparison tables,
  (2) Analyze gaps and prioritize assets across Python/governance/AI/workflow categories, (3) Download and organize
  200+ assets with directory restructuring, (4) Generate integration documentation with multi-agent orchestration patterns.
  Wave 1 parallelizes the three skill executions. Subsequent waves handle strategy, downloads by tier, and final documentation.
  Total: 18 tasks across 6 waves, maximizing parallelism where dependencies allow.

open_questions: []

gaps: []

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: Skill execution fails due to GitHub API rate limiting or network issues
      likelihood: medium
      impact: high
      mitigation: |
        Implement retry logic with exponential backoff. Cache intermediate results.
        If skills fail, fall back to manual GitHub API exploration using gem-researcher.
    - scenario: Massive asset downloads (200+) exceed filesystem limits or cause disk space issues
      likelihood: low
      impact: high
      mitigation: |
        Pre-check available disk space. Download in batches per tier.
        Implement cleanup of duplicate/obsolete assets before adding new ones.
    - scenario: Directory structure reorganization breaks existing workflows or references
      likelihood: medium
      impact: medium
      mitigation: |
        Create backup of existing .github structure before changes.
        Update all references in documentation and configuration files.
        Add migration guide for team members.
    - scenario: Asset compatibility issues (some awesome-copilot assets may not work in Project-AI context)
      likelihood: medium
      impact: low
      mitigation: |
        Test assets incrementally. Mark experimental assets clearly.
        Create validation gate after each tier download.
        Document known incompatibilities in integration guide.
  assumptions:
    - awesome-copilot repository structure remains stable during execution
    - GitHub API access is available and rate limits are sufficient
    - Current .github directory structure can accommodate 200+ new assets
    - Skills (suggest-awesome-github-copilot-*) are functional and accessible
    - User has approved "extreme prejudice" for comprehensive autonomous execution

implementation_specification:
  code_structure: |
    .github/
      skills/                    # NEW: Create if missing
        python/                  # Category: Python ecosystem
        governance/              # Category: Governance & security
        ai/                      # Category: AI orchestration
        workflow/                # Category: Development workflow
      agents/
        awesome-copilot/         # EXISTS: 18 agents currently
          [200+ new agents]      # Organized by category subdirs
      instructions/
        awesome-copilot/         # EXISTS: 14 instructions currently
          [150+ new instructions] # Organized by category subdirs
    docs/
      plan/
        awesome-copilot-import/
          plan.yaml              # This file
          comparison-tables/     # Phase 1 outputs
          integration-guide.md   # Phase 4 output
          workflow-examples/     # Phase 4 output
  affected_areas:
    - .github/skills/ (new directory)
    - .github/agents/awesome-copilot/ (expansion)
    - .github/instructions/awesome-copilot/ (expansion)
    - docs/plan/awesome-copilot-import/ (new)
  component_details:
    - component: skills-comparison-analyzer
      responsibility: Execute three suggest-awesome-copilot skills in parallel, generate comparison tables
      interfaces:
        - suggest-awesome-github-copilot-instructions skill
        - suggest-awesome-github-copilot-skills skill
        - suggest-awesome-github-copilot-agents skill
      dependencies:
        - component: awesome-copilot-repository
          relationship: reads from GitHub
      integration_points:
        - Outputs saved to docs/plan/awesome-copilot-import/comparison-tables/
    - component: priority-strategist
      responsibility: Analyze gaps, rank assets by priority (Tier 1/2/3), create download plan
      interfaces:
        - Comparison tables from Phase 1
        - gem-researcher findings on local gaps
      dependencies:
        - component: skills-comparison-analyzer
          relationship: consumes tables
      integration_points:
        - Priority matrix saved to plan.yaml task metadata
    - component: asset-downloader
      responsibility: Download, organize, and validate assets by tier and category
      interfaces:
        - GitHub raw content API
        - Local filesystem (.github/)
      dependencies:
        - component: priority-strategist
          relationship: uses priority ranking
      integration_points:
        - Creates/updates files in .github/skills/, agents/, instructions/
        - Validates each tier before proceeding
    - component: integration-documenter
      responsibility: Generate usage guides, orchestration patterns, quick-start examples
      interfaces:
        - Downloaded assets
        - Project-AI specific use cases
      dependencies:
        - component: asset-downloader
          relationship: documents imported assets
      integration_points:
        - docs/plan/awesome-copilot-import/integration-guide.md
        - docs/plan/awesome-copilot-import/workflow-examples/

contracts:
  - from_task: generate-skills-comparison
    to_task: analyze-gaps-and-prioritize
    interface: comparison_tables
    format: |
      Markdown table with columns: Asset Name, Description, Category, Local Status (missing/present/outdated), Priority Score
      Saved to docs/plan/awesome-copilot-import/comparison-tables/skills-comparison.md
  - from_task: generate-agents-comparison
    to_task: analyze-gaps-and-prioritize
    interface: comparison_tables
    format: |
      Markdown table with columns: Agent Name, Description, Category, Local Status (missing/present/outdated), Priority Score
      Saved to docs/plan/awesome-copilot-import/comparison-tables/agents-comparison.md
  - from_task: generate-instructions-comparison
    to_task: analyze-gaps-and-prioritize
    interface: comparison_tables
    format: |
      Markdown table with columns: Instruction Name, Description, Category, Local Status (missing/present/outdated), Priority Score
      Saved to docs/plan/awesome-copilot-import/comparison-tables/instructions-comparison.md
  - from_task: analyze-gaps-and-prioritize
    to_task: download-tier1-assets
    interface: priority_manifest
    format: |
      YAML list of Tier 1 assets (highest priority) with:
        - asset_type: skill|agent|instruction
        - name: string
        - category: python|governance|ai|workflow
        - source_url: string
        - target_path: string
  - from_task: analyze-gaps-and-prioritize
    to_task: download-tier2-assets
    interface: priority_manifest
    format: |
      YAML list of Tier 2 assets (medium priority) - same structure as Tier 1
  - from_task: analyze-gaps-and-prioritize
    to_task: download-tier3-assets
    interface: priority_manifest
    format: |
      YAML list of Tier 3 assets (lower priority) - same structure as Tier 1
  - from_task: download-tier1-assets
    to_task: validate-tier1
    interface: validation_report
    format: |
      JSON report with:
        - downloaded_count: number
        - failed_downloads: [{name, error}]
        - validation_status: pass|fail
        - next_tier_approved: boolean
  - from_task: download-tier2-assets
    to_task: validate-tier2
    interface: validation_report
    format: Same as Tier 1 validation report
  - from_task: download-tier3-assets
    to_task: validate-tier3
    interface: validation_report
    format: Same as Tier 1 validation report
  - from_task: validate-tier3
    to_task: generate-integration-guide
    interface: import_summary
    format: |
      JSON summary:
        - total_imported: {skills: number, agents: number, instructions: number}
        - organized_by_category: {python: [], governance: [], ai: [], workflow: []}
        - known_issues: []
  - from_task: download-tier1-assets
    to_task: generate-integration-guide
    interface: asset_catalog
    format: Asset metadata for documentation (accumulated across all tiers)
  - from_task: download-tier2-assets
    to_task: generate-integration-guide
    interface: asset_catalog
    format: Asset metadata for documentation (accumulated across all tiers)
  - from_task: download-tier3-assets
    to_task: generate-integration-guide
    interface: asset_catalog
    format: Asset metadata for documentation (accumulated across all tiers)

