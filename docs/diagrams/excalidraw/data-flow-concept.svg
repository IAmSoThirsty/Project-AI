<rect x="890" y="380" width="150" height="100" fill="#d0ebff" stroke="#1971c2" stroke-width="2" opacity="1.0" rx="10"/>
<text x="900" y="406" class="body" fill="#1971c2" font-size="16">5. Output</text>
<text x="900" y="432" class="body" fill="#1e1e1e" font-size="12">
  <tspan x="900" dy="0">• Formatting</tspan>
  <tspan x="900" dy="14.399999999999999">• Sanitization</tspan>
  <tspan x="900" dy="14.399999999999999">• Serialization</tspan>
  <tspan x="900" dy="14.399999999999999">• Response build</tspan>
</text>
<defs><marker id="arrowhead" markerWidth="10" markerHeight="10" refX="5" refY="3" orient="auto"><polygon points="0 0, 10 3, 0 6" fill="#1e1e1e"/></marker></defs><line x1="880" y1="430" x2="180" y2="260" stroke="#1e1e1e" stroke-width="3" stroke-dasharray="5,5" marker-end="url(#arrowhead)"/>
<rect x="100" y="540" width="940" height="140" fill="#f8f9fa" stroke="#1e1e1e" stroke-width="2" opacity="1.0" rx="10"/>
<text x="120" y="570" class="title" fill="#1e1e1e" font-size="20">Data Transformations</text>
<text x="120" y="599" class="body" fill="#1e1e1e" font-size="14">
  <tspan x="120" dy="0">Input → Sanitize (remove SQL injection) → Validate (schema check) → Encrypt (Fernet)</tspan>
  <tspan x="120" dy="16.8">  → Store (JSON) → Process (AI inference) → Transform (serialize) → Decrypt</tspan>
  <tspan x="120" dy="16.8">  → Format (UI-ready) → Sanitize (XSS prevention) → Output</tspan>
  <tspan x="120" dy="16.8"></tspan>
  <tspan x="120" dy="16.8">Audit trail logged at EVERY stage with timestamps, user context, and action metadata!</tspan>
</text>
</svg>