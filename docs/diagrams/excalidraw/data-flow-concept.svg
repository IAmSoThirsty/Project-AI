  <tspan x="480" dy="14.399999999999999">• Auth/Authz</tspan>
  <tspan x="480" dy="14.399999999999999">• Simulation</tspan>
</text>
<defs><marker id="arrowhead" markerWidth="10" markerHeight="10" refX="5" refY="3" orient="auto"><polygon points="0 0, 10 3, 0 6" fill="#1e1e1e"/></marker></defs><line x1="630" y1="250" x2="670" y2="250" stroke="#1e1e1e" stroke-width="3" stroke-dasharray="none" marker-end="url(#arrowhead)"/>
<rect x="680" y="200" width="150" height="100" fill="#e7d5ff" stroke="#5f3dc4" stroke-width="2" opacity="1.0" rx="10"/>
