apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ttp-api-netpol
  namespace: ttp-prod
spec:
  podSelector:
    matchLabels:
      app: ttp
      component: api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8000
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 5432  # PostgreSQL
        - protocol: TCP
          port: 6379  # Redis
        - protocol: TCP
          port: 443   # HTTPS (S3, external APIs)
        - protocol: TCP
          port: 53    # DNS
        - protocol: UDP
          port: 53    # DNS
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ttp-web-netpol
  namespace: ttp-prod
spec:
  podSelector:
    matchLabels:
      app: ttp
      component: web
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 80
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: ttp
              component: api
      ports:
        - protocol: TCP
          port: 8000
    - ports:
        - protocol: TCP
          port: 53    # DNS
        - protocol: UDP
          port: 53    # DNS
