apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ttp-ingress
  namespace: ttp-prod
  labels:
    app: ttp
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/rate-limit: "100"
spec:
  tls:
    - hosts:
        - ttp.example.com
        - api.ttp.example.com
      secretName: ttp-tls-cert
  rules:
    - host: ttp.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ttp-web
                port:
                  number: 80
    - host: api.ttp.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ttp-api
                port:
                  number: 8000
