apiVersion: v1
kind: ConfigMap
metadata:
  name: ttp-config
  namespace: ttp-prod
data:
  # Application
  APP_NAME: "TTP API"
  APP_VERSION: "1.0.0"
  DEBUG: "false"
  ENABLE_DOCS: "true"

  # Server
  HOST: "0.0.0.0"
  PORT: "8000"
  WORKERS: "4"

  # CORS
  CORS_ORIGINS: "https://ttp.example.com,https://www.ttp.example.com"

  # Database
  DATABASE_POOL_SIZE: "20"
  DATABASE_MAX_OVERFLOW: "10"
  DATABASE_POOL_TIMEOUT: "30"
  DATABASE_ECHO: "false"

  # Redis
  REDIS_MAX_CONNECTIONS: "50"

  # Authentication
  ALGORITHM: "HS256"
  ACCESS_TOKEN_EXPIRE_MINUTES: "60"
  REFRESH_TOKEN_EXPIRE_DAYS: "30"

  # S3 Storage
  S3_BUCKET: "ttp-texture-assets-prod"
  S3_REGION: "us-east-1"
  CDN_BASE_URL: "https://cdn.ttp.example.com"

  # Rate Limiting
  RATE_LIMIT_ENABLED: "true"
  RATE_LIMIT_PER_MINUTE: "60"

  # Logging
  LOG_LEVEL: "INFO"
  LOG_FORMAT: "json"

  # Observability
  OTEL_ENABLED: "true"
  PROMETHEUS_ENABLED: "true"

  # Feature Flags
  ENABLE_ASSET_UPLOAD: "true"
  ENABLE_PACK_CREATION: "true"
  ENABLE_SEARCH: "true"
