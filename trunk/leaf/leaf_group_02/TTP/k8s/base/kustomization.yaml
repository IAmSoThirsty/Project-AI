apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ttp-prod

resources:
  - namespace.yaml
  - configmap.yaml
  # NOTE: secrets.yaml is not included - create secrets manually using kubectl
  # See README.md for instructions on creating secrets securely
  - api/deployment.yaml
  - web/deployment.yaml
  - ingress.yaml
  - networkpolicy.yaml

commonLabels:
  app: ttp
  managed-by: kustomize
