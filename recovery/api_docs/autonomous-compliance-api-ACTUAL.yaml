openapi: 3.1.0
info:
  title: Autonomous Compliance API - ACTUAL IMPLEMENTATION
  description: |
    **SALVAGE REPORT - PHASE 2**
    This spec documents the ACTUAL implementation as of the current codebase inspection.
    
    **Reality**: Generic CRUD boilerplate using /api/v1/items endpoints.
    **Source**: emergent-microservices/autonomous-compliance/app/routes.py
    **Date**: 2026-03-03
    
    The service currently implements only generic Item CRUD operations with no domain-specific
    compliance logic exposed via HTTP API. The compliance logic exists in compliance_logic.thirsty
    but is not integrated with the HTTP routes.
  version: 1.0.0-actual
  contact:
    name: Fleet B Phase 2 Salvage
    email: governance@project-ai.dev

servers:
  - url: http://localhost:8014
    description: Local development
  - url: http://compliance:8000
    description: Docker network

tags:
  - name: System
  - name: Health
  - name: Items (Generic CRUD)

paths:
  /:
    get:
      summary: Service information
      operationId: root
      tags: [System]
      responses:
        '200':
          description: Service metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  service:
                    type: string
                    example: "Autonomous Compliance-as-Code Engine"
                  version:
                    type: string
                    example: "1.0.0"
                  status:
                    type: string
                    example: "operational"

  /api/v1/health/liveness:
    get:
      summary: Liveness probe
      operationId: liveness
      tags: [Health]
      responses:
        '200':
          description: Service is alive

  /api/v1/health/readiness:
    get:
      summary: Readiness probe
      operationId: readiness
      tags: [Health]
      responses:
        '200':
          description: Service is ready
        '503':
          description: Service not ready

  /api/v1/health/startup:
    get:
      summary: Startup probe
      operationId: startup
      tags: [Health]
      responses:
        '200':
          description: Service started successfully

  /metrics:
    get:
      summary: Prometheus metrics
      operationId: metrics
      tags: [Observability]
      responses:
        '200':
          description: Prometheus metrics in text format

  /api/v1/items:
    get:
      summary: List all items with pagination
      operationId: listItems
      tags: [Items (Generic CRUD)]
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
          description: Page number
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
          description: Items per page
      responses:
        '200':
          description: Paginated list of items
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
    
    post:
      summary: Create a new item
      operationId: createItem
      tags: [Items (Generic CRUD)]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ItemCreate'
      responses:
        '201':
          description: Item created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'

  /api/v1/items/{item_id}:
    get:
      summary: Get a specific item by ID
      operationId: getItem
      tags: [Items (Generic CRUD)]
      parameters:
        - name: item_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Item UUID
      responses:
        '200':
          description: Item details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'
        '404':
          description: Item not found
    
    put:
      summary: Update an existing item
      operationId: updateItem
      tags: [Items (Generic CRUD)]
      parameters:
        - name: item_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Item UUID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ItemUpdate'
      responses:
        '200':
          description: Item updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'
        '404':
          description: Item not found
    
    delete:
      summary: Delete an item
      operationId: deleteItem
      tags: [Items (Generic CRUD)]
      parameters:
        - name: item_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Item UUID
      responses:
        '204':
          description: Item deleted successfully
        '404':
          description: Item not found

components:
  schemas:
    Item:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - name
        - created_at
        - updated_at
    
    ItemCreate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
          nullable: true
      required:
        - name
    
    ItemUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
          nullable: true
    
    PaginatedResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Item'
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
        total_pages:
          type: integer
      required:
        - items
        - total
        - page
        - page_size
        - total_pages
