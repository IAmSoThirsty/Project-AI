openapi: 3.1.0
info:
  title: Autonomous Compliance API
  description: |
    Microservice for automated compliance checking, policy enforcement, and regulatory auditing.
    Monitors system behavior and ensures adherence to configured compliance frameworks.
    
    **IMPLEMENTATION STATUS**: Currently implements generic CRUD template using /api/v1/items endpoints.
    Spec-defined compliance endpoints (checks, policies, reports) are NOT YET IMPLEMENTED.
    See "Actual Implementation" section below for currently available endpoints.
  version: 1.0.0
  contact:
    name: Project AI Team
    email: governance@project-ai.dev
  license:
    name: MIT

servers:
  - url: http://localhost:8014
    description: Local development
  - url: http://compliance:8000
    description: Docker network
  - url: https://compliance.sovereign.ai
    description: Production

tags:
  - name: System
  - name: Health
  - name: Observability
  - name: Compliance Checks
  - name: Policy Management
  - name: Audit Reports

paths:
  /:
    get:
      summary: Service information
      operationId: root
      tags: [System]
      responses:
        '200':
          description: Service metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  service:
                    type: string
                  version:
                    type: string
                  status:
                    type: string

  /api/v1/health/liveness:
    get:
      summary: Liveness probe
      operationId: liveness
      tags: [Health]
      responses:
        '200':
          description: Service alive
          content:
            application/json:
              schema:
                type: object

  /api/v1/health/readiness:
    get:
      summary: Readiness probe
      operationId: readiness
      tags: [Health]
      responses:
        '200':
          description: Service ready
        '503':
          description: Service not ready

  /metrics:
    get:
      summary: Prometheus metrics
      operationId: metrics
      tags: [Observability]
      responses:
        '200':
          description: Metrics
          content:
            text/plain:
              schema:
                type: string

  # ============================================================================
  # ACTUAL IMPLEMENTATION (Generic CRUD - Currently Available)
  # ============================================================================
  
  /api/v1/items:
    get:
      summary: List items (Generic CRUD)
      description: |
        **ACTUAL IMPLEMENTATION**: Generic CRUD list endpoint
        Returns paginated list of items. This is a placeholder until
        compliance-specific endpoints are implemented.
      operationId: list_items
      tags: [Generic CRUD - Actual]
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        '200':
          description: Paginated list of items
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Item'
                  total:
                    type: integer
                  page:
                    type: integer
                  page_size:
                    type: integer
                  total_pages:
                    type: integer
    
    post:
      summary: Create item (Generic CRUD)
      description: |
        **ACTUAL IMPLEMENTATION**: Generic CRUD create endpoint
      operationId: create_item
      tags: [Generic CRUD - Actual]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ItemCreate'
      responses:
        '201':
          description: Item created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'

  /api/v1/items/{item_id}:
    get:
      summary: Get item by ID (Generic CRUD)
      description: |
        **ACTUAL IMPLEMENTATION**: Generic CRUD get endpoint
      operationId: get_item
      tags: [Generic CRUD - Actual]
      parameters:
        - name: item_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Item details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'
        '404':
          description: Item not found
    
    put:
      summary: Update item (Generic CRUD)
      description: |
        **ACTUAL IMPLEMENTATION**: Generic CRUD update endpoint
      operationId: update_item
      tags: [Generic CRUD - Actual]
      parameters:
        - name: item_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ItemUpdate'
      responses:
        '200':
          description: Item updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'
        '404':
          description: Item not found
    
    delete:
      summary: Delete item (Generic CRUD)
      description: |
        **ACTUAL IMPLEMENTATION**: Generic CRUD delete endpoint
      operationId: delete_item
      tags: [Generic CRUD - Actual]
      parameters:
        - name: item_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Item deleted
        '404':
          description: Item not found

  # ============================================================================
  # PLANNED IMPLEMENTATION (Compliance-Specific - NOT YET AVAILABLE)
  # ============================================================================
  
  /api/v1/checks:
    get:
      summary: List compliance checks (PLANNED)
      description: |
        **NOT YET IMPLEMENTED**: Returns all configured compliance checks.
        Currently, use /api/v1/items as generic CRUD alternative.
      operationId: list_checks
      tags: [Compliance Checks - Planned]
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: status
          in: query
          description: Filter by check status
          schema:
            type: string
            enum: [passing, failing, warning, unknown]
      responses:
        '200':
          description: List of checks
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/ComplianceCheck'
                  total:
                    type: integer
                  page:
                    type: integer
                  page_size:
                    type: integer

    post:
      summary: Create compliance check (PLANNED)
      description: |
        **NOT YET IMPLEMENTED**: Create a new compliance check.
      operationId: create_check
      tags: [Compliance Checks - Planned]
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckCreate'
      responses:
        '201':
          description: Check created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComplianceCheck'

  /api/v1/checks/{check_id}/execute:
    post:
      summary: Execute compliance check (PLANNED)
      description: |
        **NOT YET IMPLEMENTED**: Run a specific compliance check immediately.
      operationId: execute_check
      tags: [Compliance Checks - Planned]
      security:
        - ApiKeyAuth: []
      parameters:
        - name: check_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Check executed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckResult'

  /api/v1/policies:
    get:
      summary: List policies (PLANNED)
      description: |
        **NOT YET IMPLEMENTED**: List all compliance policies.
      operationId: list_policies
      tags: [Policy Management - Planned]
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: Policy list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/CompliancePolicy'

    post:
      summary: Create policy (PLANNED)
      description: |
        **NOT YET IMPLEMENTED**: Create a new compliance policy.
      operationId: create_policy
      tags: [Policy Management - Planned]
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PolicyCreate'
      responses:
        '201':
          description: Policy created

  /api/v1/reports:
    get:
      summary: List audit reports (PLANNED)
      description: |
        **NOT YET IMPLEMENTED**: List all audit reports.
      operationId: list_reports
      tags: [Audit Reports - Planned]
      security:
        - ApiKeyAuth: []
      parameters:
        - name: start_date
          in: query
          schema:
            type: string
            format: date
        - name: end_date
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Report list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/AuditReport'

    post:
      summary: Generate audit report (PLANNED)
      description: |
        **NOT YET IMPLEMENTED**: Generate a new audit report.
      operationId: generate_report
      tags: [Audit Reports - Planned]
      security:
        - ApiKeyAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                framework:
                  type: string
                  enum: [SOC2, GDPR, HIPAA, ISO27001]
                time_range:
                  type: object
                  properties:
                    start:
                      type: string
                      format: date-time
                    end:
                      type: string
                      format: date-time
      responses:
        '202':
          description: Report generation started

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # ============================================================================
    # Generic CRUD Schemas (Actual Implementation)
    # ============================================================================
    
    Item:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    
    ItemCreate:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        description:
          type: string
    
    ItemUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
    
    # ============================================================================
    # Compliance-Specific Schemas (Planned Implementation)
    # ============================================================================
    
    CheckCreate:
      type: object
      required:
        - name
        - check_type
      properties:
        name:
          type: string
        check_type:
          type: string
        schedule:
          type: string
        parameters:
          type: object

    ComplianceCheck:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        check_type:
          type: string
        status:
          type: string
          enum: [passing, failing, warning, unknown]
        last_run:
          type: string
          format: date-time
        next_run:
          type: string
          format: date-time

    CheckResult:
      type: object
      properties:
        check_id:
          type: string
          format: uuid
        status:
          type: string
        details:
          type: string
        evidence:
          type: object
        timestamp:
          type: string
          format: date-time

    PolicyCreate:
      type: object
      required:
        - name
        - framework
      properties:
        name:
          type: string
        framework:
          type: string
        rules:
          type: array
          items:
            type: object

    CompliancePolicy:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        framework:
          type: string
        enabled:
          type: boolean
        rules:
          type: array

    AuditReport:
      type: object
      properties:
        id:
          type: string
          format: uuid
        framework:
          type: string
        generated_at:
          type: string
          format: date-time
        status:
          type: string
        summary:
          type: object
