name: Publish to Docker Hub (convenience mirror — NOT a production source)

# ---------------------------------------------------------------------------------
# NOT PRODUCTION-ELIGIBLE. Recorded 2026-07-20.
#
# This workflow publishes the same eight images as publish.yaml to
# docker.io/iamsothirsty, but with none of the supply-chain assurances:
#
#   * no cosign signature          (publish.yaml signs every digest)
#   * no SBOM or SLSA attestation  (publish.yaml attests both)
#   * no provenance/sbom build flags
#   * no digest capture and no verification job
#   * pushes a mutable `:latest` on every push to main
#
# ghcr.io is the ONLY approved production image source. Its digests are the ones
# pinned in helm/values.prod.yaml and gated by tools/verify_supply_chain.py.
# Nothing produced here may be deployed to production or used as release evidence.
#
# OWNER DECISION REQUIRED — two options, neither taken yet:
#   (a) restrict: stop pushing `:latest` from main and keep this as a tag-only
#       mirror, leaving it explicitly non-production (smaller change); or
#   (b) parity: add cosign signing, attestation, and verification to match
#       publish.yaml (larger change; needs Docker Hub credentials with the right
#       scope, and makes Docker Hub a second production-eligible source).
#
# Until that decision is recorded, treat every image in this registry as
# unverified. See docs/operations/cab/EXTERNAL_AUDITOR_EVIDENCE_2026-07-20.md.
# ---------------------------------------------------------------------------------

on:
  push:
    tags: ["v*"]
    branches: ["main"]
  workflow_dispatch:

env:
  REGISTRY_HUB: docker.io
  REGISTRY_OWNER: iamsothirsty

permissions:
  contents: read

# `strategy` is only valid at job level, so the per-surface matrices live in
# separate jobs (mirroring publish.yaml's build-web / build-adapters split).
# The original single-job form put `strategy` inside steps, which GitHub
# rejects at workflow-parse time — the run failed in 0s on first trigger.
jobs:
  publish-api:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main'))
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref }}" && VERSION="${VERSION#refs/tags/v}"
          else
            VERSION="latest"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@18ce135bb5112fa8ce4ed6c17ab05699d7f3a5e0 # v3.11.0

      - name: Login to Docker Hub
        uses: docker/login-action@0d4c9c5ea7693da7b068278f7b52bda2a190a446 # v3.2.0
        with:
          registry: ${{ env.REGISTRY_HUB }}
          username: iamsothirsty
          password: ${{ secrets.PROJECT_AI }}

      - name: Build and push API
        uses: docker/build-push-action@c382f710d39a5bb4e430307530a720f50c2d3318 # v6.0.0
        with:
          context: .
          file: docker/api.Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY_HUB }}/${{ env.REGISTRY_OWNER }}/project-ai-api:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY_HUB }}/${{ env.REGISTRY_OWNER }}/project-ai-api:latest
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY_HUB }}/${{ env.REGISTRY_OWNER }}/project-ai-api:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY_HUB }}/${{ env.REGISTRY_OWNER }}/project-ai-api:buildcache,mode=max

  publish-web:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main'))
    permissions:
      contents: read
    strategy:
      matrix:
        # Matrix values are the web.Dockerfile APP build-arg (the pnpm package
        # directory name); the published image name reuses it directly.
        portal: [docs-portal, proof-portal, operator-console]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref }}" && VERSION="${VERSION#refs/tags/v}"
          else
            VERSION="latest"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@18ce135bb5112fa8ce4ed6c17ab05699d7f3a5e0 # v3.11.0

      - name: Login to Docker Hub
        uses: docker/login-action@0d4c9c5ea7693da7b068278f7b52bda2a190a446 # v3.2.0
        with:
          registry: ${{ env.REGISTRY_HUB }}
          username: iamsothirsty
          password: ${{ secrets.PROJECT_AI }}

      - name: Build and push ${{ matrix.portal }}
        uses: docker/build-push-action@c382f710d39a5bb4e430307530a720f50c2d3318 # v6.0.0
        with:
          context: .
          file: docker/web.Dockerfile
          push: true
          build-args: |
            APP=${{ matrix.portal }}
          tags: |
            ${{ env.REGISTRY_HUB }}/${{ env.REGISTRY_OWNER }}/project-ai-${{ matrix.portal }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY_HUB }}/${{ env.REGISTRY_OWNER }}/project-ai-${{ matrix.portal }}:latest
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

  publish-services:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main'))
    permissions:
      contents: read
    strategy:
      matrix:
        service: [swr, atlas, arbiter-rlp]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref }}" && VERSION="${VERSION#refs/tags/v}"
          else
            VERSION="latest"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@18ce135bb5112fa8ce4ed6c17ab05699d7f3a5e0 # v3.11.0

      - name: Login to Docker Hub
        uses: docker/login-action@0d4c9c5ea7693da7b068278f7b52bda2a190a446 # v3.2.0
        with:
          registry: ${{ env.REGISTRY_HUB }}
          username: iamsothirsty
          password: ${{ secrets.PROJECT_AI }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@c382f710d39a5bb4e430307530a720f50c2d3318 # v6.0.0
        with:
          context: .
          file: docker/service.Dockerfile
          push: true
          build-args: |
            PROJECT_AI_SERVICE=${{ matrix.service }}
          tags: |
            ${{ env.REGISTRY_HUB }}/${{ env.REGISTRY_OWNER }}/project-ai-${{ matrix.service }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY_HUB }}/${{ env.REGISTRY_OWNER }}/project-ai-${{ matrix.service }}:latest
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

  publish-genesis:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main'))
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref }}" && VERSION="${VERSION#refs/tags/v}"
          else
            VERSION="latest"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@18ce135bb5112fa8ce4ed6c17ab05699d7f3a5e0 # v3.11.0

      - name: Login to Docker Hub
        uses: docker/login-action@0d4c9c5ea7693da7b068278f7b52bda2a190a446 # v3.2.0
        with:
          registry: ${{ env.REGISTRY_HUB }}
          username: iamsothirsty
          password: ${{ secrets.PROJECT_AI }}

      - name: Build and push Genesis
        uses: docker/build-push-action@c382f710d39a5bb4e430307530a720f50c2d3318 # v6.0.0
        with:
          context: .
          file: docker/genesis.Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY_HUB }}/${{ env.REGISTRY_OWNER }}/project-ai-genesis:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY_HUB }}/${{ env.REGISTRY_OWNER }}/project-ai-genesis:latest
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
