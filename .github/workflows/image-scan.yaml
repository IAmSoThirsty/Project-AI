name: Image Vulnerability Scan

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  scan:
    name: Trivy scan container images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: [api, docs-portal, proof-portal, swr, atlas, arbiter-rlp, genesis]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: docker/login-action@0d4c9c5ea7693da7b068278f9b264c1f9a2c2dce # v3.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        run: docker pull ghcr.io/${{ github.repository_owner }}/project-ai-${{ matrix.image }}:latest

      - name: Trivy scan
        uses: aquasecurity/trivy-action@b2933f565dbc598b29947660e66259e3c7bc8561 # v0.20.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/project-ai-${{ matrix.image }}:latest
          format: table
          exit-code: "0"
          severity: CRITICAL,HIGH
        continue-on-error: true
