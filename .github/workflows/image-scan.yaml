name: Image Vulnerability Scan

on:
  release:
    types: [published]
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  scan:
    name: Trivy scan container images
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        image: [api, docs-portal, proof-portal, operator-console, swr, atlas, arbiter-rlp, genesis]
    env:
      IMAGE_TAG: ${{ github.event.release.tag_name || 'latest' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Lowercase registry owner
        # OCI/Docker repository names must be lowercase; github.repository_owner
        # preserves the actual account casing (e.g. "IAmSoThirsty").
        run: echo "REGISTRY_OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - uses: docker/login-action@0d4c9c5ea7693da7b068278f7b52bda2a190a446 # v3.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        run: |
          if [[ ! "$IMAGE_TAG" =~ ^[A-Za-z0-9][A-Za-z0-9._-]{0,127}$ ]]; then
            echo "Invalid OCI image tag: $IMAGE_TAG" >&2
            exit 1
          fi
          docker pull "ghcr.io/${REGISTRY_OWNER}/project-ai-${{ matrix.image }}:${IMAGE_TAG}"

      - name: Trivy scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ghcr.io/${{ env.REGISTRY_OWNER }}/project-ai-${{ matrix.image }}:${{ env.IMAGE_TAG }}
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
