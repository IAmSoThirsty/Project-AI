name: Build and Test (Full Repo)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  full-build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies (Python)
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Install Node dependencies
        run: |
          if [ -f package.json ]; then npm ci || npm install; fi
      - name: Docker Build (if Dockerfile exists)
        run: |
          if [ -f Dockerfile ]; then docker build -t project-ai-build .; fi
      - name: Run build orchestrator
        run: |
          python3 EditionV1/BUILD_EDITION_V1_CI.py || true
      - name: SBOM and Security Checks (mock)
        run: |
          echo "SBOM generation and security scans would run here."
