name: Verified POC Surface

on:
  push:
    branches:
      - main
      - github/verified-poc-face
  pull_request:
    branches:
      - main
      - github/verified-poc-face

jobs:
  verify-poc-surface:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install focused test dependency
        run: python -m pip install pytest

      - name: Check branch-facing POC documentation
        run: python scripts/verify_poc_surface.py

      - name: Run focused caregiver-scribe tests
        env:
          PYTHONPATH: src
        run: python -m pytest tests/test_personal_agent.py -q
