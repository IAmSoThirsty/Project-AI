name: Publish

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Manual image tag (e.g., v0.1.0)"
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  REGISTRY_OWNER: ${{ github.repository_owner }}

jobs:
  image-metadata:
    name: Determine image metadata
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
      labels: ${{ steps.meta.outputs.labels }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.tag }}"
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            VERSION="main-$(date +%Y%m%d)-$(echo ${{ github.sha }} | cut -c1-7)"
          else
            VERSION="dev-$(date +%Y%m%d)-$(echo ${{ github.sha }} | cut -c1-7)"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # v5.7.0
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/project-ai-api
            ${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/project-ai-docs-portal
            ${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/project-ai-proof-portal
            ${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/project-ai-swr
            ${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/project-ai-atlas
            ${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/project-ai-arbiter-rlp
            ${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/project-ai-genesis
          tags: |
            type=semver,pattern={{version}},value=${{ steps.version.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.version.outputs.version }}
            type=ref,event=branch,suffix=-{{date 'YYYYMMDD-HHmmss' tz='UTC'}}
            type=sha,prefix={{branch}}-

  build-api:
    name: Build project-ai-api
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [image-metadata]
    permissions:
      contents: read
      packages: write
      id-token: write # required for cosign keyless (Sigstore/Fulcio OIDC) signing
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Lowercase registry owner
        # OCI/Docker repository names must be lowercase. github.repository_owner
        # preserves the actual account casing (e.g. "IAmSoThirsty"), which
        # buildx rejects outright ("repository name must be lowercase").
        # Overrides env.REGISTRY_OWNER for the rest of this job via
        # GITHUB_ENV so every existing ${{ env.REGISTRY_OWNER }} reference
        # below resolves correctly without being rewritten individually.
        run: echo "REGISTRY_OWNER=$(echo '${{ env.REGISTRY_OWNER }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@18ce135bb5112fa8ce4ed6c17ab05699d7f3a5e0 # v3.11.0

      - uses: docker/login-action@0d4c9c5ea7693da7b068278f7b52bda2a190a446 # v3.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@c382f710d39a5bb4e430307530a720f50c2d3318 # v6.0.0
        with:
          context: .
          dockerfile: docker/api.Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/project-ai-api:${{ needs.image-metadata.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/project-ai-api:latest
          labels: |
            org.opencontainers.image.version=${{ needs.image-metadata.outputs.version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/project-ai-api:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/project-ai-api:buildcache,mode=max
          provenance: mode=max
          sbom: true

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image (cosign keyless)
        run: |
          cosign sign --yes \
            "${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/project-ai-api@${{ steps.build.outputs.digest }}"

  build-web:
    name: Build web portals (docs, proof)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [image-metadata]
    permissions:
      contents: read
      packages: write
      id-token: write # required for cosign keyless (Sigstore/Fulcio OIDC) signing
    strategy:
      matrix:
        portal: [docs, proof]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Lowercase registry owner
        run: echo "REGISTRY_OWNER=$(echo '${{ env.REGISTRY_OWNER }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@18ce135bb5112fa8ce4ed6c17ab05699d7f3a5e0 # v3.11.0

      - uses: docker/login-action@0d4c9c5ea7693da7b068278f7b52bda2a190a446 # v3.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.portal }}
        id: build
        uses: docker/build-push-action@c382f710d39a5bb4e430307530a720f50c2d3318 # v6.0.0
        with:
          context: .
          dockerfile: docker/web.Dockerfile
          push: true
          build-args: |
            PORTAL=${{ matrix.portal }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/project-ai-${{ matrix.portal }}-portal:${{ needs.image-metadata.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/project-ai-${{ matrix.portal }}-portal:latest
          labels: |
            org.opencontainers.image.version=${{ needs.image-metadata.outputs.version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/project-ai-${{ matrix.portal }}-portal:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/project-ai-${{ matrix.portal }}-portal:buildcache,mode=max
          provenance: mode=max
          sbom: true

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image (cosign keyless)
        run: |
          cosign sign --yes \
            "${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/project-ai-${{ matrix.portal }}-portal@${{ steps.build.outputs.digest }}"

  build-adapters:
    name: Build service adapters (swr, atlas, arbiter-rlp)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [image-metadata]
    permissions:
      contents: read
      packages: write
      id-token: write # required for cosign keyless (Sigstore/Fulcio OIDC) signing
    strategy:
      matrix:
        service: [swr, atlas, arbiter-rlp]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Lowercase registry owner
        run: echo "REGISTRY_OWNER=$(echo '${{ env.REGISTRY_OWNER }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@18ce135bb5112fa8ce4ed6c17ab05699d7f3a5e0 # v3.11.0

      - uses: docker/login-action@0d4c9c5ea7693da7b068278f7b52bda2a190a446 # v3.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        id: build
        uses: docker/build-push-action@c382f710d39a5bb4e430307530a720f50c2d3318 # v6.0.0
        with:
          context: .
          dockerfile: docker/service.Dockerfile
          push: true
          build-args: |
            PROJECT_AI_SERVICE=${{ matrix.service }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/project-ai-${{ matrix.service }}:${{ needs.image-metadata.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/project-ai-${{ matrix.service }}:latest
          labels: |
            org.opencontainers.image.version=${{ needs.image-metadata.outputs.version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/project-ai-${{ matrix.service }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/project-ai-${{ matrix.service }}:buildcache,mode=max
          provenance: mode=max
          sbom: true

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image (cosign keyless)
        run: |
          cosign sign --yes \
            "${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/project-ai-${{ matrix.service }}@${{ steps.build.outputs.digest }}"

  build-genesis:
    name: Build project-ai-genesis
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [image-metadata]
    permissions:
      contents: read
      packages: write
      id-token: write # required for cosign keyless (Sigstore/Fulcio OIDC) signing
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Lowercase registry owner
        run: echo "REGISTRY_OWNER=$(echo '${{ env.REGISTRY_OWNER }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@18ce135bb5112fa8ce4ed6c17ab05699d7f3a5e0 # v3.11.0

      - uses: docker/login-action@0d4c9c5ea7693da7b068278f7b52bda2a190a446 # v3.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@c382f710d39a5bb4e430307530a720f50c2d3318 # v6.0.0
        with:
          context: .
          dockerfile: docker/genesis.Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/project-ai-genesis:${{ needs.image-metadata.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/project-ai-genesis:latest
          labels: |
            org.opencontainers.image.version=${{ needs.image-metadata.outputs.version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/project-ai-genesis:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/project-ai-genesis:buildcache,mode=max
          provenance: mode=max
          sbom: true

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image (cosign keyless)
        run: |
          cosign sign --yes \
            "${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/project-ai-genesis@${{ steps.build.outputs.digest }}"

  publish-sbom:
    name: Generate and attach SBOMs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build-api, build-web, build-adapters, build-genesis]
    if: always()
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Create attestation note
        run: |
          echo "All container images built with provenance and SBOM attestations"
          echo "Use: cosign verify <image>@<digest> --certificate-identity-regexp='.*' --certificate-oidc-issuer=https://token.actions.githubusercontent.com to verify the keyless signature"

  verify-images:
    name: Verify published images
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [image-metadata, build-api, build-web, build-adapters, build-genesis]
    if: always()
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Lowercase registry owner
        run: echo "REGISTRY_OWNER=$(echo '${{ env.REGISTRY_OWNER }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@18ce135bb5112fa8ce4ed6c17ab05699d7f3a5e0 # v3.11.0

      - uses: docker/login-action@0d4c9c5ea7693da7b068278f7b52bda2a190a446 # v3.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify image pulls
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/project-ai-api:${{ needs.image-metadata.outputs.version }}
          docker pull ${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/project-ai-docs-portal:${{ needs.image-metadata.outputs.version }}
          docker pull ${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/project-ai-proof-portal:${{ needs.image-metadata.outputs.version }}
          docker pull ${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/project-ai-swr:${{ needs.image-metadata.outputs.version }}
          docker pull ${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/project-ai-atlas:${{ needs.image-metadata.outputs.version }}
          docker pull ${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/project-ai-arbiter-rlp:${{ needs.image-metadata.outputs.version }}
          docker pull ${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/project-ai-genesis:${{ needs.image-metadata.outputs.version }}

      - name: Inspect image manifests
        run: |
          for image in api docs-portal proof-portal swr atlas arbiter-rlp genesis; do
            echo "=== $image ==="
            docker inspect ${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/project-ai-${image}:${{ needs.image-metadata.outputs.version }} | \
              jq '.[] | {Architecture: .Architecture, Os: .Os, Created: .Created, Size: .Size}'
          done

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Verify cosign keyless signatures
        run: |
          for image in api docs-portal proof-portal swr atlas arbiter-rlp genesis; do
            echo "=== verifying $image ==="
            cosign verify \
              --certificate-identity-regexp "^https://github.com/${{ github.repository }}/\.github/workflows/publish\.yaml@.*$" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              ${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/project-ai-${image}:${{ needs.image-metadata.outputs.version }}
          done

  publish-release-notes:
    name: Create release notes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [image-metadata, verify-images]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Lowercase registry owner
        run: echo "REGISTRY_OWNER=$(echo '${{ env.REGISTRY_OWNER }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Generate release notes
        run: |
          cat > /tmp/release-notes.md << 'EOF'
          # Project-AI Release ${{ needs.image-metadata.outputs.version }}

          ## Container Images

          All images are published to `ghcr.io/${{ env.REGISTRY_OWNER }}/`:

          - `project-ai-api:${{ needs.image-metadata.outputs.version }}`
          - `project-ai-docs-portal:${{ needs.image-metadata.outputs.version }}`
          - `project-ai-proof-portal:${{ needs.image-metadata.outputs.version }}`
          - `project-ai-swr:${{ needs.image-metadata.outputs.version }}`
          - `project-ai-atlas:${{ needs.image-metadata.outputs.version }}`
          - `project-ai-arbiter-rlp:${{ needs.image-metadata.outputs.version }}`
          - `project-ai-genesis:${{ needs.image-metadata.outputs.version }}`

          ## Deployment

          Update your Helm values:

          ```yaml
          image:
            registry: ghcr.io/${{ env.REGISTRY_OWNER }}
            tag: ${{ needs.image-metadata.outputs.version }}
            pullPolicy: IfNotPresent
          ```

          Then deploy:

          ```bash
          helm upgrade --install project-ai ./helm/project-ai \
            -f helm/values.prod.yaml \
            --set image.tag=${{ needs.image-metadata.outputs.version }}
          ```

          ## Verification

          All images include:
          - A cosign keyless signature (Sigstore/Fulcio, via GitHub Actions OIDC — no
            long-lived key is stored anywhere). Verify with:
            ```bash
            cosign verify \
              --certificate-identity-regexp '^https://github.com/${{ github.repository }}/\.github/workflows/publish\.yaml@.*$' \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              ghcr.io/${{ env.REGISTRY_OWNER }}/project-ai-<image>:${{ needs.image-metadata.outputs.version }}
            ```
          - Buildx-generated SLSA provenance and Software Bill of Materials (SBOM)
            attestations (`provenance: mode=max`, `sbom: true`) — informational,
            attached to the image manifest, not independently cosign-signed.
          - Daily Trivy scan results (`.github/workflows/image-scan.yaml`) once this
            tag's image has been pulled by that scheduled workflow.

          EOF
          cat /tmp/release-notes.md

      - if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@01570a1f39cb168c169c802c3bceb9e93fb10974 # v2.1.0
        with:
          body_path: /tmp/release-notes.md
          draft: false
          prerelease: ${{ contains(needs.image-metadata.outputs.version, 'rc') || contains(needs.image-metadata.outputs.version, 'beta') }}
