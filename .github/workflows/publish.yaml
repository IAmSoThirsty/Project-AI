name: Publish

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  REGISTRY_OWNER: ${{ github.repository_owner }}
  # Pinned deliberately, and mirrored in tools/supply_chain_policy.json.
  #
  # sigstore/cosign-installer v4.x tracks the latest cosign MAJOR. The silent
  # v2 -> v3 transition changed the default signature storage from the legacy
  # `sha256-<digest>.sig` tag to an OCI 1.1 referrers bundle (falling back to a
  # suffix-less `sha256-<digest>` tag on registries like ghcr.io that do not
  # serve the referrers API). Nothing in this repository declared the expected
  # format, so when the external auditor verified with cosign 2.6.0 they
  # correctly found no `.sig` tags and reported "no signatures" -- while this
  # workflow, using the same v3 binary that wrote them, reported success.
  # Verification now requires cosign >= 3.0; see tools/supply_chain_policy.json.
  COSIGN_VERSION: 'v3.1.2'
  COSIGN_OIDC_ISSUER: 'https://token.actions.githubusercontent.com'
  # Anchored to THIS run's ref. Never use a trailing `@.*$`: that accepts any
  # git ref, which is why branch-built images previously passed this workflow's
  # own verification. `[.]` is used instead of `\.` to keep the expression free
  # of YAML/shell backslash escaping.
  COSIGN_IDENTITY_REGEXP: '^https://github[.]com/${{ github.repository }}/[.]github/workflows/publish[.]yaml@${{ github.ref }}$'

jobs:
  image-metadata:
    name: Determine image metadata
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Verify release tag matches repository version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          python - <<'PY'
          import tomllib

          with open("pyproject.toml", "rb") as handle:
              expected = f"v{tomllib.load(handle)['project']['version']}"
          actual = "${{ github.ref_name }}"
          if actual != expected:
              raise SystemExit(f"release tag {actual!r} does not match repository version {expected!r}")
          print(f"release identity verified: {actual}")
          PY

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="manual-$(date +%Y%m%d)-$(echo ${{ github.sha }} | cut -c1-7)"
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            VERSION="main-$(date +%Y%m%d)-$(echo ${{ github.sha }} | cut -c1-7)"
          else
            VERSION="dev-$(date +%Y%m%d)-$(echo ${{ github.sha }} | cut -c1-7)"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}"

      # The `docker/metadata-action` step that used to live here was removed on
      # 2026-07-20. It computed `tags` and `labels` job outputs that no job ever
      # consumed -- every build job hand-rolls its own tag list -- while
      # maintaining a second, independent copy of the eight-image list that could
      # silently drift from the real one. Only `version` is actually used.

  build-api:
    name: Build project-ai-api
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [image-metadata]
    permissions:
      contents: read
      packages: write
      id-token: write # required for cosign keyless (Sigstore/Fulcio OIDC) signing
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Lowercase registry owner
        # OCI/Docker repository names must be lowercase. github.repository_owner
        # preserves the actual account casing (e.g. "IAmSoThirsty"), which
        # buildx rejects outright ("repository name must be lowercase").
        # Overrides env.REGISTRY_OWNER for the rest of this job via
        # GITHUB_ENV so every existing ${{ env.REGISTRY_OWNER }} reference
        # below resolves correctly without being rewritten individually.
        run: echo "REGISTRY_OWNER=$(echo '${{ env.REGISTRY_OWNER }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@18ce135bb5112fa8ce4ed6c17ab05699d7f3a5e0 # v3.11.0

      - uses: docker/login-action@0d4c9c5ea7693da7b068278f7b52bda2a190a446 # v3.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@c382f710d39a5bb4e430307530a720f50c2d3318 # v6.0.0
        with:
          context: .
          file: docker/api.Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/project-ai-api:${{ needs.image-metadata.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/project-ai-api:latest
          labels: |
            org.opencontainers.image.version=${{ needs.image-metadata.outputs.version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/project-ai-api:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/project-ai-api:buildcache,mode=max
          provenance: mode=max
          sbom: true

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: ${{ env.COSIGN_VERSION }}

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/project-ai-api@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: false

      - name: Sign and attest image (cosign keyless)
        run: |
          bash tools/sign_and_attest_image.sh \
            "${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/project-ai-api@${{ steps.build.outputs.digest }}" \
            sbom.spdx.json

  build-web:
    name: Build web portals (docs, proof, operator-console)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [image-metadata]
    permissions:
      contents: read
      packages: write
      id-token: write # required for cosign keyless (Sigstore/Fulcio OIDC) signing
    strategy:
      matrix:
        # Matrix values are the web.Dockerfile APP build-arg (the pnpm package
        # directory name); the published image name reuses it directly.
        portal: [docs-portal, proof-portal, operator-console]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Lowercase registry owner
        run: echo "REGISTRY_OWNER=$(echo '${{ env.REGISTRY_OWNER }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@18ce135bb5112fa8ce4ed6c17ab05699d7f3a5e0 # v3.11.0

      - uses: docker/login-action@0d4c9c5ea7693da7b068278f7b52bda2a190a446 # v3.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.portal }}
        id: build
        uses: docker/build-push-action@c382f710d39a5bb4e430307530a720f50c2d3318 # v6.0.0
        with:
          context: .
          file: docker/web.Dockerfile
          push: true
          build-args: |
            APP=${{ matrix.portal }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/project-ai-${{ matrix.portal }}:${{ needs.image-metadata.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/project-ai-${{ matrix.portal }}:latest
          labels: |
            org.opencontainers.image.version=${{ needs.image-metadata.outputs.version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/project-ai-${{ matrix.portal }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/project-ai-${{ matrix.portal }}:buildcache,mode=max
          provenance: mode=max
          sbom: true

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: ${{ env.COSIGN_VERSION }}

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/project-ai-${{ matrix.portal }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: false

      - name: Sign and attest image (cosign keyless)
        run: |
          bash tools/sign_and_attest_image.sh \
            "${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/project-ai-${{ matrix.portal }}@${{ steps.build.outputs.digest }}" \
            sbom.spdx.json

  build-adapters:
    name: Build service adapters (swr, atlas, arbiter-rlp)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [image-metadata]
    permissions:
      contents: read
      packages: write
      id-token: write # required for cosign keyless (Sigstore/Fulcio OIDC) signing
    strategy:
      matrix:
        service: [swr, atlas, arbiter-rlp]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Lowercase registry owner
        run: echo "REGISTRY_OWNER=$(echo '${{ env.REGISTRY_OWNER }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@18ce135bb5112fa8ce4ed6c17ab05699d7f3a5e0 # v3.11.0

      - uses: docker/login-action@0d4c9c5ea7693da7b068278f7b52bda2a190a446 # v3.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        id: build
        uses: docker/build-push-action@c382f710d39a5bb4e430307530a720f50c2d3318 # v6.0.0
        with:
          context: .
          file: docker/service.Dockerfile
          push: true
          build-args: |
            PROJECT_AI_SERVICE=${{ matrix.service }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/project-ai-${{ matrix.service }}:${{ needs.image-metadata.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/project-ai-${{ matrix.service }}:latest
          labels: |
            org.opencontainers.image.version=${{ needs.image-metadata.outputs.version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/project-ai-${{ matrix.service }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/project-ai-${{ matrix.service }}:buildcache,mode=max
          provenance: mode=max
          sbom: true

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: ${{ env.COSIGN_VERSION }}

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/project-ai-${{ matrix.service }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: false

      - name: Sign and attest image (cosign keyless)
        run: |
          bash tools/sign_and_attest_image.sh \
            "${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/project-ai-${{ matrix.service }}@${{ steps.build.outputs.digest }}" \
            sbom.spdx.json

  build-genesis:
    name: Build project-ai-genesis
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [image-metadata]
    permissions:
      contents: read
      packages: write
      id-token: write # required for cosign keyless (Sigstore/Fulcio OIDC) signing
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Lowercase registry owner
        run: echo "REGISTRY_OWNER=$(echo '${{ env.REGISTRY_OWNER }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@18ce135bb5112fa8ce4ed6c17ab05699d7f3a5e0 # v3.11.0

      - uses: docker/login-action@0d4c9c5ea7693da7b068278f7b52bda2a190a446 # v3.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@c382f710d39a5bb4e430307530a720f50c2d3318 # v6.0.0
        with:
          context: .
          file: docker/genesis.Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/project-ai-genesis:${{ needs.image-metadata.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/project-ai-genesis:latest
          labels: |
            org.opencontainers.image.version=${{ needs.image-metadata.outputs.version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/project-ai-genesis:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/project-ai-genesis:buildcache,mode=max
          provenance: mode=max
          sbom: true

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: ${{ env.COSIGN_VERSION }}

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/project-ai-genesis@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: false

      - name: Sign and attest image (cosign keyless)
        run: |
          bash tools/sign_and_attest_image.sh \
            "${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/project-ai-genesis@${{ steps.build.outputs.digest }}" \
            sbom.spdx.json

  # The former `publish-sbom` job was removed on 2026-07-20. It was named
  # "Generate and attach SBOMs" but its only steps were two `echo` statements: it
  # generated nothing, attached nothing, and held `packages: write` for no reason,
  # while `if: always()` kept it green even when every build job failed. Its name
  # asserted a capability it did not have, which is precisely the kind of
  # fabricated success AGENTS.md forbids. Real SBOM and SLSA provenance
  # attestation now happens inside each build job, where the image digest and the
  # OIDC token are actually in scope, via tools/sign_and_attest_image.sh.

  verify-images:
    name: Verify published images
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [image-metadata, build-api, build-web, build-adapters, build-genesis]
    # `if: always()` was removed on 2026-07-20. It caused this job to run even when
    # every build and signing job had failed, so a green "Verify published images"
    # could coexist with a supply chain that had produced nothing.
    permissions:
      contents: read
      packages: read
      id-token: write # cosign needs an OIDC token to fetch trust material
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Lowercase registry owner
        run: echo "REGISTRY_OWNER=$(echo '${{ env.REGISTRY_OWNER }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@18ce135bb5112fa8ce4ed6c17ab05699d7f3a5e0 # v3.11.0

      - uses: docker/login-action@0d4c9c5ea7693da7b068278f7b52bda2a190a446 # v3.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve every tag to an immutable digest
        run: |
          set -euo pipefail
          # Resolve once, here, and verify only digests from this point on. The previous
          # implementation passed `:${version}` tags straight to cosign, so cosign
          # re-resolved the tag independently of whatever `cosign sign` had operated on.
          # A tag is a mutable pointer; it can move between signing and verification.
          echo "{" > digests.json
          first=1
          for image in api docs-portal proof-portal operator-console swr atlas arbiter-rlp genesis; do
            reference="${REGISTRY}/${REGISTRY_OWNER}/project-ai-${image}:${{ needs.image-metadata.outputs.version }}"
            digest="$(docker buildx imagetools inspect "$reference" --format '{{json .Manifest.Digest}}' | tr -d '"')"
            if [[ ! "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
              echo "::error::invalid digest for ${reference}: ${digest}" >&2
              exit 1
            fi
            [[ $first -eq 1 ]] && first=0 || echo "," >> digests.json
            printf '  "%s": "%s"' "$image" "$digest" >> digests.json
            echo "resolved ${image} -> ${digest}"
          done
          printf '\n}\n' >> digests.json
          cat digests.json

      - name: Verify image pulls by digest
        run: |
          set -euo pipefail
          for image in api docs-portal proof-portal operator-console swr atlas arbiter-rlp genesis; do
            digest="$(jq -r --arg k "$image" '.[$k]' digests.json)"
            docker pull "${REGISTRY}/${REGISTRY_OWNER}/project-ai-${image}@${digest}"
            docker inspect "${REGISTRY}/${REGISTRY_OWNER}/project-ai-${image}@${digest}" \
              | jq '.[] | {Architecture, Os, Created, Size}'
          done

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: ${{ env.COSIGN_VERSION }}

      - name: Verify signatures and attestations for every digest
        run: |
          set -uo pipefail
          failed=0
          for image in api docs-portal proof-portal operator-console swr atlas arbiter-rlp genesis; do
            digest="$(jq -r --arg k "$image" '.[$k]' digests.json)"
            ref="${REGISTRY}/${REGISTRY_OWNER}/project-ai-${image}@${digest}"
            echo "=== ${image} ${digest} ==="

            if ! cosign verify \
                --certificate-identity-regexp "${COSIGN_IDENTITY_REGEXP}" \
                --certificate-oidc-issuer "${COSIGN_OIDC_ISSUER}" \
                "$ref" > /dev/null; then
              echo "::error::signature verification failed for ${ref}"
              failed=1
            fi

            for predicate_type in spdxjson slsaprovenance; do
              if ! cosign verify-attestation \
                  --type "$predicate_type" \
                  --certificate-identity-regexp "${COSIGN_IDENTITY_REGEXP}" \
                  --certificate-oidc-issuer "${COSIGN_OIDC_ISSUER}" \
                  "$ref" > /dev/null; then
                echo "::error::${predicate_type} attestation verification failed for ${ref}"
                failed=1
              fi
            done
          done
          # Every image is checked before exiting so that one bad image does not mask
          # the state of the other seven, but any failure still fails the job.
          exit "$failed"

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Independent postcondition check (repository verifier)
        run: |
          set -euo pipefail
          # A second, independent opinion. tools/verify_supply_chain.py speaks the plain
          # OCI distribution API and shares no code with cosign, so if cosign changes its
          # default storage format again this step fails loudly instead of moving silently
          # with it. Verifying cosign's output with cosign alone is what allowed the
          # 2026-07-20 discrepancy to go unnoticed inside this workflow.
          jq '{image_digests: .}' digests.json > successor-digests.json
          uv run --with pyyaml python tools/verify_supply_chain.py \
            --digests successor-digests.json \
            --require-attestations

  publish-release-notes:
    name: Create release notes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [image-metadata, verify-images]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
      packages: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Lowercase registry owner
        run: echo "REGISTRY_OWNER=$(echo '${{ env.REGISTRY_OWNER }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@18ce135bb5112fa8ce4ed6c17ab05699d7f3a5e0 # v3.11.0

      - uses: docker/login-action@0d4c9c5ea7693da7b068278f7b52bda2a190a446 # v3.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Generate and verify immutable image overlay
        run: |
          mkdir -p build/release
          overlay="build/release/project-ai-${{ needs.image-metadata.outputs.version }}-image-digests.yaml"
          {
            echo "image:"
            echo "  tag: \"${{ needs.image-metadata.outputs.version }}\""
            echo "  digests:"
            for image in api docs-portal proof-portal operator-console swr atlas arbiter-rlp genesis; do
              reference="${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/project-ai-${image}:${{ needs.image-metadata.outputs.version }}"
              digest="$(docker buildx imagetools inspect "$reference" --format '{{json .Manifest.Digest}}' | tr -d '"')"
              if [[ ! "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
                echo "::error::invalid digest for ${reference}: ${digest}" >&2
                exit 1
              fi
              printf '    %s: %s\n' "$image" "$digest"
            done
          } > "$overlay"

          helm template project-ai ./helm/project-ai \
            --namespace project-ai-prod \
            -f helm/values.prod.yaml \
            -f "$overlay" | \
            uv run --with pyyaml python tools/verify_helm_template.py \
              --expected-namespace project-ai-prod \
              --project-image-registry ghcr.io \
              --project-image-owner "$REGISTRY_OWNER" \
              --require-project-image-digests

      - name: Generate release notes
        run: |
          cat > /tmp/release-notes.md << 'EOF'
          # Project-AI Release ${{ needs.image-metadata.outputs.version }}

          ## Container Images

          All images are published to `ghcr.io/${{ env.REGISTRY_OWNER }}/`:

          - `project-ai-api:${{ needs.image-metadata.outputs.version }}`
          - `project-ai-docs-portal:${{ needs.image-metadata.outputs.version }}`
          - `project-ai-proof-portal:${{ needs.image-metadata.outputs.version }}`
          - `project-ai-operator-console:${{ needs.image-metadata.outputs.version }}`
          - `project-ai-swr:${{ needs.image-metadata.outputs.version }}`
          - `project-ai-atlas:${{ needs.image-metadata.outputs.version }}`
          - `project-ai-arbiter-rlp:${{ needs.image-metadata.outputs.version }}`
          - `project-ai-genesis:${{ needs.image-metadata.outputs.version }}`

          ## Deployment

          Download the attached
          `project-ai-${{ needs.image-metadata.outputs.version }}-image-digests.yaml`
          overlay. It contains the exact OCI index digest resolved after all
          eight images were published and signature-verified. Do not deploy by
          changing only `image.tag`; the base production values intentionally
          retain historical v0.0.2 digests.

          ```yaml
          image:
            tag: ${{ needs.image-metadata.outputs.version }}
            digests:
              api: sha256:<RELEASE-DIGEST>
              # ...all eight release images...
          ```

          Then deploy:

          ```bash
          helm upgrade --install project-ai ./helm/project-ai \
            -f helm/values.prod.yaml \
            -f project-ai-${{ needs.image-metadata.outputs.version }}-image-digests.yaml
          ```

          ## Verification

          > **cosign 3.0 or newer is required.** These signatures use the Sigstore
          > bundle format published through the OCI 1.1 referrers mechanism. Because
          > ghcr.io does not serve the referrers API, cosign stores them under a
          > `sha256-<digest>` fallback tag. cosign 2.x looks only for the legacy
          > `sha256-<digest>.sig` tag, which is intentionally **not** written, so
          > cosign 2.x reports "no signatures found" for correctly signed images.
          > That is a verifier limitation, not a missing signature.

          Verify **by digest**, never by tag — a tag is mutable and can move after
          signing. Take the digests from the attached
          `project-ai-${{ needs.image-metadata.outputs.version }}-image-digests.yaml`.

          All images include:
          - A cosign keyless signature (Sigstore/Fulcio, via GitHub Actions OIDC — no
            long-lived key is stored anywhere). Verify with:
            ```bash
            cosign verify \
              --certificate-identity-regexp '^https://github[.]com/${{ github.repository }}/[.]github/workflows/publish[.]yaml@${{ github.ref }}$' \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              ghcr.io/${{ env.REGISTRY_OWNER }}/project-ai-<image>@sha256:<digest>
            ```
            Do not relax that identity pattern to `@.*$`. A trailing wildcard accepts a
            signature issued to any git ref, including an unreviewed branch, which
            defeats the purpose of checking the identity at all.
          - cosign SPDX SBOM and SLSA provenance attestations. Verify with:
            ```bash
            cosign verify-attestation --type spdxjson \
              --certificate-identity-regexp '<same anchored pattern as above>' \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              ghcr.io/${{ env.REGISTRY_OWNER }}/project-ai-<image>@sha256:<digest>
            ```
            (repeat with `--type slsaprovenance`)
          - Buildx-generated in-toto layers (`provenance: mode=max`, `sbom: true`)
            embedded in the image index. These are **informational only** — no standard
            verifier reads them. They do not satisfy an attestation requirement; the
            cosign attestations above are what count.
          - Daily Trivy scan results (`.github/workflows/image-scan.yaml`) once this
            tag's image has been pulled by that scheduled workflow.

          EOF
          cat /tmp/release-notes.md

      - if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@01570a1f39cb168c169c802c3bceb9e93fb10974 # v2.1.0
        with:
          body_path: /tmp/release-notes.md
          files: build/release/project-ai-${{ needs.image-metadata.outputs.version }}-image-digests.yaml
          draft: false
          prerelease: ${{ contains(needs.image-metadata.outputs.version, 'rc') || contains(needs.image-metadata.outputs.version, 'beta') }}
