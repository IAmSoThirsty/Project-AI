name: Nightly CI

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: false

jobs:
  python:
    name: Python (policy, type, test, replay)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - name: Install Qt runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1
      - run: uv sync --frozen --all-extras --all-packages
      - run: uv run ruff check . && uv run ruff format --check .
      - name: Strict MyPy
        run: |
          uv run mypy --ignore-missing-imports \
            packages/kernel/src packages/security/src packages/governance/src \
            packages/capability/src packages/execution/src packages/companion/src \
            packages/swr/src packages/atlas/src packages/arbiter/src packages/rlp/src \
            packages/api/src packages/cli/src apps/desktop/src apps/services/src tools
      - run: |
          uv run pytest -q --tb=short \
            --cov=kernel --cov=security --cov=governance --cov=capability \
            --cov=execution --cov=companion --cov=swr --cov=atlas \
            --cov=arbiter_gov --cov=rlp --cov=project_ai_api --cov=project_ai_cli \
            --cov=project_ai_desktop --cov=project_ai_services \
            --cov-branch --cov-report=term-missing --cov-fail-under=80
      - run: uv run python tools/canonical_replay.py
      - run: uv run python tools/verify_frozen_history.py

  rust:
    name: Rust (fmt, clippy, test)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      RUSTUP_TOOLCHAIN: stable
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - run: cargo fmt --check
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - run: cargo test --workspace --locked

  node:
    name: Node (lint, test, build)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: "10.30.0"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm web:lint
      - run: pnpm web:test
      - run: pnpm web:build
