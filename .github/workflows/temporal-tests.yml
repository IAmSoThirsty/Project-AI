name: Temporal and Liara Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'cognition/**'
      - 'tests/temporal/**'
      - '.github/workflows/temporal-tests.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'cognition/**'
      - 'tests/temporal/**'
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt
          pip install pytest pytest-asyncio pytest-cov pytest-timeout
      
      - name: Run unit tests
        run: |
          pytest tests/temporal/ \
            -v \
            --cov=cognition \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term \
            --timeout=300 \
            -m "not integration and not benchmark"
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: temporal-unit
          name: temporal-unit-coverage
      
      - name: Archive coverage report
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: htmlcov/

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    
    services:
      temporal:
        image: temporalio/auto-setup:latest
        ports:
          - 7233:7233
        env:
          DB: postgresql
          POSTGRES_USER: temporal
          POSTGRES_PWD: temporal
          POSTGRES_SEEDS: postgres
        options: >-
          --health-cmd "tctl cluster health"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt
          pip install pytest pytest-asyncio pytest-timeout
      
      - name: Wait for Temporal
        run: |
          timeout 60 sh -c 'until nc -z localhost 7233; do sleep 1; done'
      
      - name: Run integration tests
        env:
          TEMPORAL_HOST: localhost:7233
          TEMPORAL_NAMESPACE: default
        run: |
          pytest tests/temporal/ \
            -v \
            --timeout=600 \
            -m "integration"

  performance-tests:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    needs: unit-tests
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt
          pip install pytest pytest-benchmark pytest-asyncio
      
      - name: Run performance benchmarks
        run: |
          pytest tests/temporal/test_performance_benchmarks.py \
            -v \
            --benchmark-only \
            --benchmark-json=benchmark-results.json
      
      - name: Store benchmark results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Temporal Performance Benchmarks
          tool: 'pytest'
          output-file-path: benchmark-results.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
      
      - name: Upload benchmark results
        uses: actions/upload-artifact@v3
        with:
          name: benchmark-results
          path: benchmark-results.json

  race-condition-tests:
    name: Race Condition Detection
    runs-on: ubuntu-latest
    needs: unit-tests
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt
          pip install pytest pytest-timeout
      
      - name: Run race condition tests
        run: |
          pytest tests/temporal/test_race_conditions.py \
            -v \
            --timeout=600 \
            -x
      
      - name: Run with stress testing
        run: |
          for i in {1..5}; do
            echo "Stress test iteration $i"
            pytest tests/temporal/test_race_conditions.py -v --timeout=300 || exit 1
          done

  byzantine-fault-tests:
    name: Byzantine Fault Tolerance
    runs-on: ubuntu-latest
    needs: unit-tests
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt
          pip install pytest pytest-asyncio pytest-timeout
      
      - name: Run Byzantine fault tests
        run: |
          pytest tests/temporal/test_byzantine_faults.py \
            -v \
            --timeout=600

  temporal-consistency-tests:
    name: Temporal Consistency
    runs-on: ubuntu-latest
    needs: unit-tests
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt
          pip install pytest pytest-asyncio pytest-timeout
      
      - name: Run temporal consistency tests
        run: |
          pytest tests/temporal/test_temporal_consistency.py \
            -v \
            --timeout=600

  failover-tests:
    name: Failover Scenarios
    runs-on: ubuntu-latest
    needs: unit-tests
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt
          pip install pytest pytest-timeout pytest-asyncio
      
      - name: Run failover scenario tests
        run: |
          pytest tests/temporal/test_failover_scenarios.py \
            -v \
            --timeout=600

  test-report:
    name: Generate Test Report
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, performance-tests, race-condition-tests, byzantine-fault-tests, temporal-consistency-tests, failover-tests]
    if: always()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt
          pip install pytest pytest-html
      
      - name: Generate HTML report
        run: |
          pytest tests/temporal/ \
            -v \
            --html=temporal-test-report.html \
            --self-contained-html \
            -m "not benchmark" \
            || true
      
      - name: Upload test report
        uses: actions/upload-artifact@v3
        with:
          name: temporal-test-report
          path: temporal-test-report.html

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run Bandit security scan
        run: |
          pip install bandit
          bandit -r cognition/liara* cognition/kernel_liara.py -f json -o bandit-report.json || true
      
      - name: Upload security report
        uses: actions/upload-artifact@v3
        with:
          name: security-scan-report
          path: bandit-report.json
