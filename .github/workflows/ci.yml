name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy
          pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check src/ tests/ --output-format=github

      - name: Ruff format check
        run: ruff format --check src/ tests/

      - name: MyPy type check
        run: mypy src/ --ignore-missing-imports
        continue-on-error: true

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-timeout

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            --timeout=120 \
            -x -v
        env:
          PYTHONPATH: .

      - name: Upload coverage artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  security:
    name: Security Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install security tools
        run: |
          pip install detect-secrets bandit[toml]

      - name: Bandit security scan
        run: |
          bandit -r src/ \
            --severity-level medium \
            --confidence-level medium \
            -x "src/app/testing/*,src/app/generated/*"

      - name: Check for hardcoded secrets
        run: |
          detect-secrets scan --all-files \
            --exclude-files '\.lock$|node_modules|\.git/'

      - name: Check for .env files
        run: |
          if find . -name '.env' -not -path './node_modules/*' -not -path './.git/*' | grep -q .; then
            echo "::error::Found .env file(s) in repository!"
            exit 1
          fi

      - name: Check for private keys
        run: |
          KEYS=$(grep -rl 'PRIVATE KEY' --include='*.pem' --include='*.key' --include='*.p12' . 2>/dev/null || true)
          if [ -n "$KEYS" ]; then
            echo "::error::Found private key file(s):"
            echo "$KEYS"
            exit 1
          fi
