name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python (policy, type, test, replay)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - name: Install Qt runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1
      - name: Install locked workspace
        run: uv sync --frozen --all-extras --all-packages
      - name: Pre-commit and gitleaks
        run: SKIP=no-commit-to-branch uv run pre-commit run --all-files
      - name: Ruff
        run: uv run ruff check . && uv run ruff format --check .
      - name: Strict MyPy
        run: |
          uv run mypy --ignore-missing-imports \
            packages/kernel/src packages/security/src packages/governance/src \
            packages/capability/src packages/execution/src packages/companion/src \
            packages/swr/src packages/atlas/src packages/arbiter/src packages/rlp/src \
            packages/api/src packages/cli/src apps/desktop/src apps/services/src tools
      - name: Test with branch coverage
        run: |
          uv run pytest -q --tb=short \
            --cov=kernel --cov=security --cov=governance --cov=capability \
            --cov=execution --cov=companion --cov=swr --cov=atlas \
            --cov=arbiter_gov --cov=rlp --cov=project_ai_api --cov=project_ai_cli \
            --cov=project_ai_desktop --cov=project_ai_services \
            --cov-branch --cov-report=term-missing --cov-fail-under=80
      - name: Canonical replay 5/5
        run: uv run python tools/canonical_replay.py
      - name: Frozen history 2264/2264
        run: uv run python tools/verify_frozen_history.py

  rust:
    name: Rust (fmt, clippy, test)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      RUSTUP_TOOLCHAIN: stable
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - run: cargo fmt --check
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - run: cargo test --workspace --locked

  node:
    name: Node (lint, test, build)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: "10.30.0"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm web:lint
      - run: pnpm web:test
      - run: pnpm web:build

  android:
    name: Android (unit, debug assembly)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
      - name: Install declared SDK
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"
      - name: Test and assemble
        working-directory: apps/android
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon testDebugUnitTest assembleDebug

  desktop:
    name: Desktop (offscreen, unsigned onedir)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      QT_QPA_PLATFORM: offscreen
      PROJECT_AI_DESKTOP_SMOKE: "1"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: Install Qt runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1
      - run: uv sync --frozen --all-extras --all-packages
      - name: Source smoke
        run: uv run --package project-ai-desktop python -m project_ai_desktop
      - name: Build unsigned development artifact
        run: |
          mkdir -p build/ci-desktop/spec
          uv run --package project-ai-desktop pyinstaller \
            --noconfirm --clean --onedir \
            --name Project-AI-Desktop \
            --distpath build/ci-desktop/dist \
            --workpath build/ci-desktop/work \
            --specpath build/ci-desktop/spec \
            apps/desktop/src/project_ai_desktop/__main__.py
          build/ci-desktop/dist/Project-AI-Desktop/Project-AI-Desktop

  compose:
    name: Compose (build, health, security)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - run: docker compose config --quiet
      - run: docker compose up -d --build --wait --wait-timeout 240
      - run: python tools/verify_compose_health.py
      - if: always()
        run: docker compose logs --no-color
      - if: always()
        run: docker compose down

  kubernetes:
    name: Kubernetes (Helm, client dry run)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - run: helm lint helm/project-ai
      - run: uv sync --frozen --all-extras --all-packages
      - run: helm template project-ai-dev helm/project-ai | uv run python tools/verify_helm_template.py

  sbom:
    name: SBOM (CycloneDX)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - run: uv sync --frozen --all-extras --all-packages
      - name: Generate reproducible Python workspace SBOM
        run: |
          mkdir -p build/sbom
          uvx --from cyclonedx-bom==7.3.0 cyclonedx-py environment \
            "$(uv run python -c 'import sys; print(sys.executable)')" \
            --pyproject pyproject.toml \
            --output-reproducible \
            --validate \
            --output-format JSON \
            --output-file build/sbom/project-ai-python.cdx.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: project-ai-python-sbom
          path: build/sbom/project-ai-python.cdx.json
          if-no-files-found: error

      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-cyclonedx-${{ hashFiles('Cargo.lock') }}
      - name: Generate Rust workspace SBOM
        run: |
          mkdir -p build/sbom
          cargo install cargo-cyclonedx --locked
          cargo cyclonedx --format json --override-filename project-ai-rust
          mv Cargo.cdx.json build/sbom/project-ai-rust.cdx.json 2>/dev/null || \
            mv crates/genesis-emitter/project-ai-rust.cdx.json build/sbom/project-ai-rust.cdx.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: project-ai-rust-sbom
          path: build/sbom/project-ai-rust.cdx.json
          if-no-files-found: error
