name: Deploy Hub of Epstein Files (hub.thirstysprojects.com)

on:
  push:
    branches: [master]
    paths:
      - 'web/hub-epstein/**'

jobs:
  deploy:
    name: FTP Deploy Hub to /hub/
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy web/hub-epstein/ to /hub/ subdirectory
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: web/hub-epstein/
          server-dir: /hub/
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.DS_Store
