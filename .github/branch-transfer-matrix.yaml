version: 1
model: thirst-of-gods-branch-transfer
repository: Project-AI
runtime_terms:
  - Thirsty-Lang
  - Thirst of Gods
  - T.A.R.L.
  - Shadow Thirst
  - TSCG
  - TSCG+B

lanes:
  main:
    role: production-trunk
    source_of_truth: true
    accepts_from:
      - release/*
      - hotfix/*
      - governance-lock
    must_include:
      architecture:
        - core_system_map
        - runtime_map
      governance:
        - agi_charter_reference
        - sovereign_covenant_reference
        - tscg_contract_index
      operations:
        - release_artifact_checksums
        - rollback_runbook
      security:
        - required_scan_status
        - signed_commit_or_tag_policy
    gates:
      - required_ci_checks
      - required_reviews
      - conversation_resolution

  dev:
    role: integration
    accepts_from:
      - experiment/*
      - heal/repair
      - security-hardening
    promotes_to:
      - release/*
    must_include:
      - integration_test_results
      - migration_compatibility_notes
      - observability_delta
    gates:
      - lint
      - tests

  experiment/*:
    role: exploration
    accepts_from:
      - main
      - dev
    promotes_to:
      - dev
    must_include:
      - experiment_charter
      - feature_flag_plan
      - rollback_plan
      - shadow_thirst_simulation_output

  heal/repair:
    role: invariant-recovery
    accepts_from:
      - incident_reports
      - runtime_failures
    promotes_to:
      - dev
      - hotfix/*
    must_include:
      - invariant_statement_before
      - invariant_statement_after
      - repair_proof

  legacy/*:
    role: archival-and-compatibility
    default_mutability: frozen
    accepts_from:
      - historical_snapshot
    promotes_to: []
    must_include:
      - archival_intent
      - compatibility_scope
      - risk_acceptance_for_mutation

  release/*:
    role: release-candidate
    accepts_from:
      - dev
    promotes_to:
      - main
    must_include:
      - sbom
      - vulnerability_report
      - artifact_signature_manifest
      - reproducibility_report

  hotfix/*:
    role: emergency-fix
    accepts_from:
      - main
    promotes_to:
      - main
      - dev
    must_include:
      - incident_id
      - blast_radius_analysis
      - backmerge_confirmation

  governance-lock:
    role: constitutional-governance
    accepts_from:
      - governance_rfc
      - audit_findings
    promotes_to:
      - main
    must_include:
      - quorum_evidence
      - policy_diff_tscg
      - migration_notes

  security-hardening:
    role: threat-mitigation
    accepts_from:
      - security_findings
      - adversarial_tests
    promotes_to:
      - dev
      - hotfix/*
    must_include:
      - threat_model_delta
      - mitigation_validation
      - policy_enforcement_changes

propagation_policy:
  transfer_artifacts_to_all_active_lanes: true
  preserve_legacy_archives_by_default: true
  required_transfer_files:
    - .github/THIRST_BRANCH_ACCEPTANCE_CRITERIA.md
    - .github/branch-transfer-matrix.yaml
