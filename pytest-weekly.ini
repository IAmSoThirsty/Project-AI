# Pytest configuration for WEEKLY stress tests (Sunday)
# Runs ONLY the 1000-scenario constitutional tests

[pytest]
testpaths = tests
python_files = test_four_laws_1000*.py
python_classes = Test*
python_functions = test_*

addopts = 
    -v
    --strict-markers
    --tb=short
    --maxfail=100

markers =
    weekly: Weekly stress tests (1000-scenario constitutional tests)

filterwarnings =
    ignore::DeprecationWarning:passlib
