[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "project-ai-capability"
version = "0.0.3"
description = "Signed, scoped, expiring capability tokens for Project-AI"
readme = "README.md"
requires-python = "==3.12.10"
license = "MIT"
dependencies = ["project-ai-kernel"]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Programming Language :: Python :: 3.12",
    "Topic :: Security",
]

[tool.hatch.build.targets.wheel]
packages = ["src/capability"]
