[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "project-ai-identity"
version = "0.0.2"
description = "Actor identity registry (Phase B recovery from Project-AI-Canonical)"
readme = "README.md"
requires-python = "==3.12.10"
license = "MIT"
dependencies = []
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Environment :: Win32 (MS Windows)",
    "Programming Language :: Python :: 3.12",
    "Topic :: Security",
]

[project.optional-dependencies]
test = ["pytest>=8.0.0"]

[tool.hatch.build.targets.wheel]
packages = ["src/identity"]
