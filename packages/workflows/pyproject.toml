[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "project-ai-workflows"
version = "0.0.0.dev0"
description = "Durable non-actuating human request and review workflows"
readme = "README.md"
requires-python = "==3.12.10"
license = "MIT"
dependencies = ["project-ai-accounts", "psycopg[binary]>=3.2.0"]

[project.optional-dependencies]
test = ["pytest>=8.0.0"]

[tool.hatch.build.targets.wheel]
packages = ["src/workflows"]
