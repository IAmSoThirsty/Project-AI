[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "project-ai-convergence"
version = "0.0.0.dev0"
description = "Shadow-Thirst (6th tier) convergence harness across all Thirsty-Lang tier specs in Project-AI Beginnings"
readme = "README.md"
requires-python = "==3.12.10"
license = "MIT"
dependencies = [
    "project-ai-atlas",
    "project-ai-governance",
    "project-ai-security",
    "project-ai-swr",
    "thirsty-lang==0.8.1",
]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Programming Language :: Python :: 3.12",
]

[tool.hatch.build.targets.wheel]
packages = ["src/convergence"]
