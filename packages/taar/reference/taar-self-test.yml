name: TAAR self-test
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Test suite
        run: python -m pytest -q
      - name: TAAR inspects its own workflows
        run: |
          python -m taar.cli workflows explain
          python -m taar.cli workflows scan
          python -m taar.cli workflows classify
      - name: First swarm smoke run
        run: |
          python -m taar.cli status
          python -m taar.cli run heartbeat-reader
          python -m taar.cli run heartbeat-report-writer
          python -m taar.cli run workflow-reader
