tasks:
- id: heartbeat-check
  enabled: true
  description: 'heartbeat reader: gather evidence via builtin:heartbeat_check.'
  agent_id: heartbeat-reader
  task_type: check
  expected_artifact_type: evidence_bundle
  required_capabilities:
  - execute-heartbeat-check
  - write-evidence
  input_paths:
  - .project-ai/automation/**
  - registry/**
  - taar.toml
  output_paths:
  - .project-ai/automation/evidence/heartbeat-reader/
  commands:
  - builtin:heartbeat_check
  schedule_id: every-5-minutes
  priority: 10
  timeout_seconds: 60
  classification_default: OPEN
  human_approval_required: false
  consumes_evidence_from: []
  fail_closed_on:
  - missing_registry
  - unauthorized_path
  - unauthorized_command
- id: heartbeat-report
  enabled: true
  description: Write the heartbeat report from heartbeat-reader evidence.
  agent_id: heartbeat-report-writer
  task_type: report
  expected_artifact_type: report
  required_capabilities:
  - write-report
  - write-evidence
  input_paths:
  - .project-ai/automation/evidence/heartbeat-reader/**
  output_paths:
  - .project-ai/automation/reports/facility/heartbeat-latest.md
  commands:
  - builtin:report_writer
  schedule_id: after-heartbeat-reader
  priority: 11
  timeout_seconds: 120
  classification_default: OPEN
  human_approval_required: false
  consumes_evidence_from:
  - heartbeat-reader
  fail_closed_on:
  - missing_evidence
  - invalid_evidence_hash
  - unauthorized_path
