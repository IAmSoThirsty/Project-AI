[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "project-ai-taar"
version = "0.0.2"
description = "TAAR (Thirsty's Active Agent Runner): operator-side, report-only agent runner with hash-sealed evidence and an append-only audit log (experimental)"
readme = "README.md"
requires-python = "==3.12.10"
license = "MIT"
dependencies = [
    "pyyaml>=6.0.2",
    "typer>=0.12.5",
    "rich>=13.9.0",
]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Programming Language :: Python :: 3.12",
]

[project.scripts]
taar = "taar.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/taar"]
