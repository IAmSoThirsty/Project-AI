- id: execute-git-status-check
  description: Run the git-status check command(s).
  capability_type: git_status
  allowed_agents:
  - git-status-reader
  allowed_commands:
  - git status --porcelain=v1
  - git branch --show-current
  - git rev-parse HEAD
  allowed_paths:
  - .git/**
  - '**'
  classification_ceiling: OPEN
  requires_human_approval: false
- id: execute-ruff-check
  description: Run the ruff check command(s).
  capability_type: command
  allowed_agents:
  - ruff-reader
  allowed_commands:
  - uv run ruff check . --output-format=json
  allowed_paths:
  - '**'
  classification_ceiling: OPEN
  requires_human_approval: false
- id: execute-mypy-check
  description: Run the mypy check command(s).
  capability_type: command
  allowed_agents:
  - mypy-reader
  allowed_commands:
  - uv run python -m mypy . --show-error-codes --no-error-summary
  allowed_paths:
  - '**'
  classification_ceiling: OPEN
  requires_human_approval: false
- id: execute-pytest-collect-check
  description: Run the pytest-collect check command(s).
  capability_type: command
  allowed_agents:
  - pytest-collect-reader
  allowed_commands:
  - uv run python -m pytest --collect-only -q
  allowed_paths:
  - '**'
  classification_ceiling: OPEN
  requires_human_approval: false
