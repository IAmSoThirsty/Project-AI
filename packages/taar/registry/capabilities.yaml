capabilities:
- id: execute-heartbeat-check
  description: Run the heartbeat check command(s).
  capability_type: command
  allowed_agents:
  - heartbeat-reader
  allowed_commands:
  - builtin:heartbeat_check
  allowed_paths:
  - .project-ai/automation/**
  - registry/**
  - taar.toml
  classification_ceiling: OPEN
  requires_human_approval: false
