[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "project-ai-atlas"
version = "0.0.0.dev0"
description = "Subordinate deterministic analytical projections for Project-AI"
readme = "README.md"
requires-python = "==3.12.10"
license = "MIT"
dependencies = [
    "project-ai-execution",
    "project-ai-kernel",
    "numpy>=1.24,<2.0",
    "scipy>=1.11,<2.0",
    "thirsty-lang==0.8.1",
]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Programming Language :: Python :: 3.12",
]

[tool.hatch.build.targets.wheel]
packages = ["src/atlas"]
