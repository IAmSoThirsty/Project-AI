[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "project-ai-cli"
version = "0.0.0.dev0"
description = "API-bound operator CLI for Project-AI development"
readme = "README.md"
requires-python = "==3.12.10"
license = "MIT"
dependencies = [
    "typer>=0.16.0",
    "thirsty-lang==0.8.1",
]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Environment :: Console",
    "Programming Language :: Python :: 3.12",
]

[project.scripts]
project-ai = "project_ai_cli.app:run"

[tool.hatch.build.targets.wheel]
packages = ["src/project_ai_cli"]
