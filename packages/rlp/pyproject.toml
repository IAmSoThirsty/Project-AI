[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "project-ai-rlp"
version = "0.0.3"
description = "Experimental Reciprocal Legitimacy Protocol for Project-AI"
readme = "README.md"
requires-python = "==3.12.10"
license = "MIT"
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Programming Language :: Python :: 3.12",
]

[tool.hatch.build.targets.wheel]
packages = ["src/rlp"]

[tool.hatch.build.targets.wheel.force-include]
"governance_framework" = "rlp/governance_framework"
