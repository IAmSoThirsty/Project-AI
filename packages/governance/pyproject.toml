[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "project-ai-governance"
version = "0.0.0.dev0"
description = "Fail-closed AI-side governance with unilateral veto for Project-AI"
readme = "README.md"
requires-python = "==3.12.10"
license = "MIT"
dependencies = ["project-ai-kernel"]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Programming Language :: Python :: 3.12",
]

[tool.hatch.build.targets.wheel]
packages = ["src/governance"]
