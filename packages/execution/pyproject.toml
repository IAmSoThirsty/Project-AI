[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "project-ai-execution"
version = "0.0.3"
description = "Sole fail-closed governed actuation gate for Project-AI"
readme = "README.md"
requires-python = "==3.12.10"
license = "MIT"
dependencies = [
    "project-ai-capability",
    "project-ai-governance",
    "project-ai-kernel",
    "project-ai-security",
]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Programming Language :: Python :: 3.12",
]

[tool.hatch.build.targets.wheel]
packages = ["src/execution"]
