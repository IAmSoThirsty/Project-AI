[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "project-ai-waterfall-adapter"
version = "0.0.3"
description = "Fail-closed governed adapter boundary for Thirstys Waterfall"
readme = "README.md"
requires-python = "==3.12.10"
license = "MIT"
dependencies = [
    "project-ai-capability",
    "project-ai-execution",
    "project-ai-kernel",
]

[tool.hatch.build.targets.wheel]
packages = ["src/waterfall_adapter"]
