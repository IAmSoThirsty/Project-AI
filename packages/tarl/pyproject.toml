[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "project-ai-tarl"
version = "0.0.2"
description = "TARL: Threat-Adaptive Rule Language (C3 of STAGE_19 §9)."
readme = "README.md"
requires-python = "==3.12.10"
license = "MIT"
dependencies = [
    "project-ai-kernel",
    "thirsty-lang==0.8.1",
]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Programming Language :: Python :: 3.12",
]

[tool.hatch.build.targets.wheel]
packages = ["src/tarl"]
