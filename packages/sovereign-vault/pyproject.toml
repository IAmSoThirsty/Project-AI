[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "project-ai-sovereign-vault"
version = "0.0.3"
description = "Object-level narrow-release sovereign vault (verify -> authorize -> release -> zeroize). Ported from T:/00-Active/sovereign_vault."
readme = "README.md"
requires-python = "==3.12.10"
license = "MIT"
dependencies = [
    "cryptography>=42.0",
    "pynacl>=1.5",
]

classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Programming Language :: Python :: 3.12",
]

[tool.hatch.build.targets.wheel]
packages = ["src/sovereign_vault"]
