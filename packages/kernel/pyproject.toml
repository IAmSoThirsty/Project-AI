[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "project-ai-kernel"
version = "0.0.2"
description = "Deterministic evidence, invariant, state, replay, and time primitives for Project-AI"
readme = "README.md"
requires-python = "==3.12.10"
license = "MIT"
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Programming Language :: Python :: 3.12",
]

[tool.hatch.build.targets.wheel]
packages = ["src/kernel"]
