    statement: Valid safety claims require enforced denial, fail-closed behavior, auditable events, tested rejection, no bypass
      route, verified behavior, and durable continuity.
    applies_when: 'true'
    phases:
    - verify
    severity: critical
    failure_action: block
    required_evidence:
    - denial_test
    - audit_record
    - continuity_update
    waivable: false
