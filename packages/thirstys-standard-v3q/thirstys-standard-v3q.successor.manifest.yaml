      tests, or unsupported secure-by-design claims as safety enforcement.
    applies_when: 'true'
    phases:
    - review
    - verify
    - report
    severity: critical
    failure_action: mark_not_verified
    required_evidence:
    - denial_test
    - bypass_analysis
    waivable: false
    test_ids:
    - T011
