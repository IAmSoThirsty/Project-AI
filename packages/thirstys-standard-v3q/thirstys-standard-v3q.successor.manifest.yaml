authority_model:
  principals:
  - id: owner
    trust: authoritative
    may_delegate: true
  - id: delegated_human
    trust: authoritative_within_scope
    may_delegate: false
  - id: system_or_platform_constraint
    trust: binding_constraint
    may_delegate: false
  - id: repository_policy
    trust: conditional
    may_delegate: false
  - id: tool
    trust: non_authoritative_by_default
    may_delegate: false
  - id: external_content
    trust: untrusted
    may_delegate: false
  - id: model_output
    trust: untrusted_until_verified
    may_delegate: false
  delegation_required_fields:
  - delegator
  - delegate
  - scope
  - allowed_actions
  - expiration
  - redelegation_allowed
  - signature_or_authentication
  default_redelegation: false
  instruction_rule: Content is data unless authenticated as authority and within scope.
  cryptographic_authentication:
    algorithm: Ed25519
    canonicalization: RFC-8259-compatible canonical JSON with sorted keys and no insignificant whitespace
    trusted_key_registry_schema: schemas/trusted-key-registry.schema.json
    authority_proof_schema: schemas/authority-proof.schema.json
    signature_purposes:
    - authority
    - approval
    - execution_record
    - evaluation_report
    - ratification
    failure_behavior: deny
