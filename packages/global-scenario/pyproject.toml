[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "project-ai-global-scenario"
version = "0.0.0.dev0"
description = "God-tier real-world risk analysis scenario engine (J2 scenario engine port)"
readme = "README.md"
requires-python = "==3.12.10"
license = "MIT"
dependencies = [
    "numpy>=1.26.0",
    "project-ai-simulation-contract",
    "requests>=2.31.0",
]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Environment :: Win32 (MS Windows)",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering",
]

[project.optional-dependencies]
test = ["pytest>=8.0.0"]

[tool.hatch.build.targets.wheel]
packages = ["src/global_scenario"]
