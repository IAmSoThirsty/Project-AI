[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "project-ai-cerberus"
version = "0.0.0.dev0"
description = "Multi-agent runtime surface (Q5 closure): spawn-constrained agents + lockdown controller"
readme = "README.md"
requires-python = "==3.12.10"
license = "MIT"
dependencies = [
    "project-ai-kernel",
    "project-ai-governance",
    "project-ai-execution",
    "project-ai-capability",
]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Programming Language :: Python :: 3.12",
]

[tool.hatch.build.targets.wheel]
packages = ["src/cerberus"]
