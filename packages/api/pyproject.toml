[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "project-ai-api"
version = "0.0.3"
description = "Fail-closed FastAPI gateway for Project-AI development surfaces"
readme = "README.md"
requires-python = "==3.12.10"
license = "MIT"
dependencies = [
    "fastapi>=0.115.0",
    "project-ai-accounts",
    "project-ai-atlas",
    "project-ai-capability",
    "project-ai-execution",
    "project-ai-governance",
    "project-ai-kernel",
    "project-ai-security",
    "project-ai-swr",
    "project-ai-taar",
    "project-ai-thirstys-standard-v3q",
    "project-ai-thirstys-waterfall",
    "project-ai-waterfall-adapter",
    "project-ai-workflows",
    "prometheus-client>=0.25.0,<0.26",
    "uvicorn[standard]>=0.34.0",
]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Programming Language :: Python :: 3.12",
]

[project.optional-dependencies]
build = ["pyinstaller>=6.11.0"]

[project.scripts]
project-ai-api-server = "project_ai_api.server:main"

[tool.hatch.build.targets.wheel]
packages = ["src/project_ai_api"]
