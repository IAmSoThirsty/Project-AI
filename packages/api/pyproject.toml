[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "project-ai-api"
version = "0.0.0.dev0"
description = "Fail-closed FastAPI gateway for Project-AI development surfaces"
readme = "README.md"
requires-python = "==3.12.10"
license = "MIT"
dependencies = [
    "fastapi>=0.115.0",
    "project-ai-atlas",
    "project-ai-kernel",
    "project-ai-security",
    "uvicorn[standard]>=0.34.0",
]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Programming Language :: Python :: 3.12",
]

[tool.hatch.build.targets.wheel]
packages = ["src/project_ai_api"]
