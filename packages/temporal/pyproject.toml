[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "project-ai-temporal"
version = "0.0.0.dev0"
description = "Temporal-style workflow orchestration (C4 of STAGE_19 §9): typed workflow/activity contracts without external SDK dependency."
readme = "README.md"
requires-python = "==3.12.10"
license = "MIT"
dependencies = [
    "project-ai-kernel",
]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Programming Language :: Python :: 3.12",
]

[tool.hatch.build.targets.wheel]
packages = ["src/temporal"]
