version: '3.8'

services:
  # --- CANONICAL PRODUCTION API (FastAPI) ---
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    image: projectai/api:1.0.0
    container_name: project-ai-api
    restart: unless-stopped
    ports:
      - "8001:8001"
    networks:
      - sovereign_net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health/live', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3

  # --- THE ORCHESTRATOR ---
  cerberus:
    build: 
      context: ../Cerberus-main
      dockerfile: Dockerfile
    image: projectai/cerberus:omega
    container_name: cerberus_omega
    restart: unless-stopped
    volumes:
      - spine_data:/var/data/spine
    networks:
      - sovereign_net
    deploy:
      resources:
        limits:
          cpus: '2.00'
          memory: 4G

  # --- THE GUARDIAN (Monolith) ---
  monolith:
    image: projectai/monolith:omega
    # Build context would be Thirstys-Monolith-master if we had a Dockerfile there
    container_name: thirsty_monolith
    networks:
      - sovereign_net
    environment:
      - TARL_POLICY_PATH=/app/tarl_policies

networks:
  sovereign_net:
    driver: bridge
    internal: true # No external internet access by default

volumes:
  spine_data:
    driver: local
