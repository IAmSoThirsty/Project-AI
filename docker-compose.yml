# [2026-03-01 13:20]
# Productivity: Active

services:
  project-ai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: project-ai-dev
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app/src
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - FERNET_KEY=${FERNET_KEY}
      - DATA_DIR=/app/data
      - LOG_DIR=/app/logs
      - ENABLE_METRICS=true
      - METRICS_PORT=8000
    volumes:
      - app-data:/app/data
      - app-logs:/app/logs
    ports:
      - "5000:5000"
      - "8000:8000"
      - "8001:8001"
      - "8002:8002"
      - "8003:8003"
    env_file:
      - .env
    networks:
      - project-ai-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: project-ai-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"
    volumes:
      - ./config/prometheus:/etc/prometheus
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - project-ai-network
    restart: unless-stopped
    depends_on:
      - project-ai

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: project-ai-alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    volumes:
      - ./config/alertmanager:/etc/alertmanager
      - alertmanager-data:/alertmanager
    ports:
      - "9093:9093"
    networks:
      - project-ai-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.1
    container_name: project-ai-grafana
    volumes:
      - ./config/grafana:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - project-ai-network
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus

  temporal:
    image: temporalio/auto-setup:1.24.2
    container_name: project-ai-temporal
    ports:
      - "7233:7233"
      - "8233:8233"
    networks:
      - project-ai-network
    depends_on:
      - temporal-postgresql
    restart: unless-stopped

  temporal-postgresql:
    image: postgres:13
    container_name: project-ai-temporal-db
    environment:
      - POSTGRES_USER=${TEMPORAL_DB_USER:-temporal}
      - POSTGRES_PASSWORD=${TEMPORAL_DB_PASSWORD}
      - POSTGRES_DB=${TEMPORAL_DB_NAME:-temporal}
    volumes:
      - temporal-postgresql-data:/var/lib/postgresql/data
    networks:
      - project-ai-network
    restart: unless-stopped

  temporal-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: project-ai-temporal-worker
    command: python -m app.temporal.worker
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app/src
      - TEMPORAL_HOST=temporal:7233
    networks:
      - project-ai-network
    depends_on:
      - temporal
    restart: unless-stopped
    env_file:
      - .env

  # --- Emergent Microservices (Governance Tier 2) ---

  mutation-firewall:
    build:
      context: ./emergent-microservices/ai-mutation-governance-firewall
    container_name: ai-mutation-firewall
    ports: ["8011:8000"]
    networks:
      - project-ai-network
    depends_on:
      - prometheus

  incident-reflex:
    build:
      context: ./emergent-microservices/autonomous-incident-reflex-system
    container_name: incident-reflex-system
    ports: ["8012:8000"]
    networks:
      - project-ai-network
    depends_on:
      - prometheus

  trust-graph:
    build:
      context: ./emergent-microservices/trust-graph-engine
    container_name: trust-graph-engine
    ports: ["8013:8000"]
    networks:
      - project-ai-network
    depends_on:
      - prometheus

  data-vault:
    build:
      context: ./emergent-microservices/sovereign-data-vault
    container_name: sovereign-data-vault
    ports: ["8014:8000"]
    networks:
      - project-ai-network
    depends_on:
      - prometheus

  negotiation-agent:
    build:
      context: ./emergent-microservices/autonomous-negotiation-agent
    container_name: negotiation-agent
    ports: ["8015:8000"]
    networks:
      - project-ai-network
    depends_on:
      - prometheus

  compliance-engine:
    build:
      context: ./emergent-microservices/autonomous-compliance
    container_name: compliance-engine
    ports: ["8016:8000"]
    networks:
      - project-ai-network
    depends_on:
      - prometheus

  verifiable-reality:
    build:
      context: ./emergent-microservices/verifiable-reality
    container_name: verifiable-reality
    ports: ["8017:8000"]
    networks:
      - project-ai-network
    depends_on:
      - prometheus

  i-believe-in-you:
    build:
      context: ./emergent-microservices/i-believe-in-you
    container_name: i-believe-in-you
    ports: ["8018:8000"]
    networks:
      - project-ai-network
    depends_on:
      - prometheus

volumes:
  app-data:
  app-logs:
  prometheus-data:
  alertmanager-data:
  grafana-data:
  temporal-postgresql-data:

networks:
  project-ai-network:
    driver: bridge
