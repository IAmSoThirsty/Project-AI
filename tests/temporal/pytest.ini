# Temporal/Liara Testing Configuration

[pytest]
# Test discovery
testpaths = tests/temporal
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    integration: Integration tests requiring external services (Temporal server)
    benchmark: Performance benchmark tests
    slow: Slow-running tests (> 10 seconds)
    asyncio: Asynchronous tests using asyncio

# Coverage settings
addopts =
    --strict-markers
    --strict-config
    --verbose
    --color=yes
    --code-highlight=yes
    --tb=short

# Asyncio configuration
asyncio_mode = auto

# Warnings
filterwarnings =
    error
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Coverage
[coverage:run]
source = cognition
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
    */venv/*
    */.venv/*

[coverage:report]
precision = 2
show_missing = true
skip_covered = false

exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
    @abc.abstractmethod

[coverage:html]
directory = htmlcov_temporal
