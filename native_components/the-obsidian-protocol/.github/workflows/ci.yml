name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"
jobs:
  # Stage 1: Build Governance
  build:
    name: Build & Dependency Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
- name: Generate SBOM
        run: |
          pip install cyclonedx-bom
          cyclonedx-py -r -i requirements.txt -o sbom.json
      
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json
- name: Verify dependency hashes
        run: |
          pip install pip-audit
          pip-audit --desc
  
  # Stage 2: Static Analysis
  lint:
    name: Static Analysis
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install ruff mypy bandit black isort
          pip install -r requirements.txt
      
      - name: Run Ruff (linting)
        run: ruff check app/
      
      - name: Run Black (formatting check)
        run: black --check app/
      
      - name: Run isort (import sorting)
        run: isort --check-only app/
      
      - name: Run mypy (type checking)
        run: mypy app/ --ignore-missing-imports
      
      - name: Run Bandit (security lint)
        run: bandit -r app/ -f json -o bandit-report.json || true
      
      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json
  
  secrets-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for secret scanning
      
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  
  # Stage 3: Unit Testing
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [lint, secrets-scan]
    
steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio hypothesis      
      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term \
--cov-fail-under=100 \
-v
      
      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: true
      
- name: Run fuzz tests
        run: pytest tests/ -k fuzz -v --hypothesis-show-statistics
# Stage 4: Integration Testing
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Build Docker image
        run: docker build -t the_obsidian_protocol:test .
      
      - name: Run service in container
        run: |
          docker run -d \
            --name the_obsidian_protocol_test \
            -p 8000:8000 \
            the_obsidian_protocol:test
      
      - name: Wait for service startup
        run: |
          timeout 60 bash -c 'until curl -f http://localhost:8000/health; do sleep 2; done'
      
      - name: Test health endpoints
        run: |
          curl -f http://localhost:8000/health
          curl -f http://localhost:8000/health/ready
          curl -f http://localhost:8000/health/live
      
      - name: Test API endpoints
        run: |
          # Test with authentication
          curl -f -H "X-API-Key: test-key" \
            http://localhost:8000/api/v1/items
      
      - name: Check service logs
        if: always()
        run: docker logs the_obsidian_protocol_test
      
      - name: Cleanup
        if: always()
        run: docker rm -f the_obsidian_protocol_test
  
  # Stage 5: Security Scanning
  security-scan:
    name: Security & Vulnerability Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'  # Fail on critical vulnerabilities
      
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
      
      - name: Build Docker image for scanning
        run: docker build -t the_obsidian_protocol:scan .
      
      - name: Run Trivy container scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'the_obsidian_protocol:scan'
          format: 'sarif'
          output: 'trivy-container-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
  
  # Stage 6: Build & Sign Artifacts
  build-artifacts:
    name: Build & Sign Artifacts
    runs-on: ubuntu-latest
    needs: [integration-test, security-scan]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}          password: ${{ secrets.GITHUB_TOKEN }}      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/the_obsidian_protocol
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=semver,pattern={{version}}      
      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}          labels: ${{ steps.meta.outputs.labels }}          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
      
- name: Install Cosign
        uses: sigstore/cosign-installer@v3
      
      - name: Sign container image
        run: |
          cosign sign --yes \
            ghcr.io/${{ github.repository }}/the_obsidian_protocol@${{ steps.build.outputs.digest }}- name: Generate artifact attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ghcr.io/${{ github.repository }}/the_obsidian_protocol
          subject-digest: ${{ steps.build.outputs.digest }}          push-to-registry: true
