# Prometheus Configuration for Project-AI (canonical FastAPI runtime)

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'project-ai'
    environment: 'production'

scrape_configs:
  - job_name: 'project-ai-api'
    static_configs:
      - targets: ['api:8001']
        labels:
          component: 'canonical-fastapi-runtime'
          service: 'project-ai-api'
    metrics_path: '/metrics'
    scrape_interval: 15s
    scrape_timeout: 10s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
