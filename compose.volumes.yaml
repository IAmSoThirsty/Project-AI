version: "3.9"

# Production-grade persistence layer
# Compose file override for production deployments

services:
  postgres:
    image: dhi.io/patroni:4.1-debian13-pg18
    container_name: project-ai-postgres
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: project_ai
      POSTGRES_DB: project_ai_state
      PATRONI_SCOPE: project-ai
      PATRONI_RESTAPI_LISTEN: 0.0.0.0:8008
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./helm/project-ai/config/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U project_ai -d project_ai_state"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - services
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    container_name: project-ai-redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - services
    restart: unless-stopped

  # Update API to use PostgreSQL for audit
  api:
    environment:
      PROJECT_AI_DATABASE_URL: postgresql://project_ai:${POSTGRES_PASSWORD}@postgres:5432/project_ai_state
      PROJECT_AI_REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      PROJECT_AI_AUDIT_BACKEND: postgresql
    volumes:
      - postgres-data:/data/postgres
      - redis-data:/data/redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Update services to use Redis for caching
  swr:
    environment:
      PROJECT_AI_CACHE_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
    depends_on:
      redis:
        condition: service_healthy

  atlas:
    environment:
      PROJECT_AI_CACHE_URL: redis://:${REDIS_PASSWORD}@redis:6379/2
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${POSTGRES_DATA_PATH:-./.data/postgres}

  redis-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${REDIS_DATA_PATH:-./.data/redis}

networks:
  services:
    external: true
