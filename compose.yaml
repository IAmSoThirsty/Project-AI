name: project-ai

# ============================================================================
# Port Assignments (see docs/PORT_LEDGER.md)
# - API:          127.0.0.1:8000 → 8000  (published)
# - Docs Portal:  127.0.0.1:4173 → 8080  (published)
# - Proof Portal: 127.0.0.1:4174 → 8080  (published)
# - Genesis:      8080  (internal only)
# - swr/atlas/arbiter-rlp: 8000 (internal only)
# ============================================================================

x-python-defaults: &python-defaults
  read_only: true
  cap_drop: [ALL]
  security_opt: [no-new-privileges:true]
  tmpfs:
    - /tmp:size=64m,mode=1777
  restart: unless-stopped

x-python-health: &python-health
  test: [CMD, curl, -f, "http://127.0.0.1:8000/health/live"]
  interval: 5s
  timeout: 3s
  retries: 12
  start_period: 5s

x-web-health: &web-health
  test: [CMD, wget, -q, -O, /dev/null, "http://127.0.0.1:8080/healthz"]
  interval: 5s
  timeout: 3s
  retries: 12
  start_period: 3s

services:
  # ========== API (Port 8000, published) ==========
  api:
    <<: *python-defaults
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    image: project-ai:api
    container_name: project-ai-api
    environment:
      PROJECT_AI_API_TOKEN: ${PROJECT_AI_API_TOKEN:-}
      PROJECT_AI_AUDIT_PATH: /data/chimera-audit.jsonl
      PROJECT_AI_DOI_REGISTRY: /app/docs/reference/DOI_REGISTRY.md
      PYTHONUNBUFFERED: "1"
    volumes:
      - audit-data:/data
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck: *python-health
    networks:
      - services

  # ========== Web Portals (published) ==========
  docs-portal:
    read_only: true
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    tmpfs:
      - /tmp:size=64m,mode=1777
    restart: unless-stopped
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      args:
        PORTAL: docs
    image: project-ai:docs-portal
    container_name: project-ai-docs-portal
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "127.0.0.1:4173:8080"
    healthcheck: *web-health
    networks:
      - services

  proof-portal:
    read_only: true
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    tmpfs:
      - /tmp:size=64m,mode=1777
    restart: unless-stopped
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      args:
        PORTAL: proof
    image: project-ai:proof-portal
    container_name: project-ai-proof-portal
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "127.0.0.1:4174:8080"
    healthcheck: *web-health
    networks:
      - services

  # ========== Background Services (internal only) ==========
  swr:
    <<: *python-defaults
    build:
      context: .
      dockerfile: docker/service.Dockerfile
    image: project-ai:service
    container_name: project-ai-swr
    environment:
      PROJECT_AI_SERVICE: swr
      PYTHONUNBUFFERED: "1"
    expose:
      - 8000
    healthcheck: *python-health
    networks:
      - services

  atlas:
    <<: *python-defaults
    build:
      context: .
      dockerfile: docker/service.Dockerfile
    image: project-ai:service
    container_name: project-ai-atlas
    environment:
      PROJECT_AI_SERVICE: atlas
      PYTHONUNBUFFERED: "1"
    expose:
      - 8000
    healthcheck: *python-health
    networks:
      - services

  arbiter-rlp:
    <<: *python-defaults
    build:
      context: .
      dockerfile: docker/service.Dockerfile
    image: project-ai:service
    container_name: project-ai-arbiter-rlp
    environment:
      PROJECT_AI_SERVICE: arbiter-rlp
      PYTHONUNBUFFERED: "1"
    expose:
      - 8000
    healthcheck: *python-health
    networks:
      - services

  # ========== Genesis (Port 8080, internal only) ==========
  genesis:
    read_only: true
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    restart: unless-stopped
    build:
      context: .
      dockerfile: docker/genesis.Dockerfile
    image: project-ai:genesis
    container_name: project-ai-genesis
    expose:
      - 8080
    healthcheck:
      test: [CMD, genesis-emitter, health]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 3s
    networks:
      - services

volumes:
  audit-data:
    driver: local

networks:
  services:
    driver: bridge
