# Minimal Kubernetes Deployment for Project-AI
# Simplified version for testing and local development

apiVersion: v1
kind: Namespace
metadata:
  name: project-ai
  labels:
    name: project-ai
    environment: dev
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: project-ai-config
  namespace: project-ai
data:
  PYTHONUNBUFFERED: "1"
  ENVIRONMENT: "development"
  LOG_LEVEL: "INFO"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: project-ai
  namespace: project-ai
  labels:
    app: project-ai
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: project-ai
  template:
    metadata:
      labels:
        app: project-ai
        version: v1
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: project-ai
        image: project-ai:test
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        envFrom:
        - configMapRef:
            name: project-ai-config
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          exec:
            command:
            - python
            - -c
            - "import sys; sys.exit(0)"
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
        readinessProbe:
          exec:
            command:
            - python
            - -c
            - "import sys; sys.exit(0)"
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: project-ai
  namespace: project-ai
  labels:
    app: project-ai
spec:
  type: ClusterIP
  selector:
    app: project-ai
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
---
# Optional: Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: project-ai-hpa
  namespace: project-ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: project-ai
  minReplicas: 1
  maxReplicas: 3
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
