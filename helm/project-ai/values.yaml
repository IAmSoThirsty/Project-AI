# Development values — not for production use.
# Images are built locally by `docker compose build`.
# For production, use: helm/values.prod.yaml

image:
  registry: ""
  owner: ""
  tag: ""
  digests: {}
  pullPolicy: IfNotPresent

# Kubernetes Secrets for development (optional)
secrets:
  create: false  # Development uses local environment variables
  required: false
  existingSecret: ""
  api:
    token: ""  # Not used in development
    setupSecret: ""
    mfaKey: ""
    databaseUrl: ""
    executionSecret: ""

# Thirsty's Standard V3 + Q enforcement is opt-in for development. Production
# loads public verification keys only and fails application startup closed.
v3q:
  required: false

# Storage - disabled in development (uses emptyDir)
persistence:
  enabled: false
  storageClass: "standard"
  size: 1Gi
  audit:
    enabled: false
    size: 1Gi
    path: /data

# RBAC - disabled in development (optional, uses default SA)
rbac:
  create: false  # Development uses default ServiceAccount
  api:
    watchPods: false  # API does not need pod discovery

# Network Policies - disabled in development
networkPolicy:
  enabled: false  # Development allows all traffic
  ingressController:
    namespaceLabels:
      kubernetes.io/metadata.name: ingress-nginx
    podLabels:
      app.kubernetes.io/component: controller
  dns:
    namespaceLabels:
      kubernetes.io/metadata.name: kube-system
    podLabels:
      k8s-app: kube-dns

# Pod Disruption Budgets - disabled in development
podDisruptionBudgets:
  enabled: false

# Monitoring - disabled in development
monitoring:
  enabled: false
  # The chart integrates with an existing Prometheus Operator and Grafana
  # dashboard sidecar. It does not deploy an embedded monitoring stack.
  serviceMonitor:
    labels:
      release: prometheus
  grafanaDashboard:
    enabled: true
    labels:
      grafana_dashboard: "1"
  networkPolicy:
    namespaceLabels:
      kubernetes.io/metadata.name: monitoring
    podLabels:
      app.kubernetes.io/name: prometheus

# Alerting - disabled in development
alerting:
  enabled: false
  prometheusRule:
    labels:
      release: prometheus

# Backup - disabled in development
backup:
  enabled: false
  schedule: "0 2 * * *"
  retentionDays: 30
  image: "busybox@sha256:73aaf090f3d85aa34ee199857f03fa3a95c8ede2ffd4cc2cdb5b94e566b11662"
  imagePullPolicy: IfNotPresent
  # Remote upload is off by default everywhere: it requires an operator-provided
  # rclone config Secret (see backup.remote.secretName) mounted at
  # /remote-config/rclone.conf. With remote.enabled=false, the CronJob only
  # writes/prunes local tar.gz archives on the backup PVC. Not exercised
  # against a live cluster or a real remote target — verify in a real
  # environment before relying on it.
  remote:
    enabled: false
    destination: ""  # e.g. "s3:my-bucket/project-ai-backups"
    secretName: ""   # defaults to "<release>-backup-remote" if unset

# CronJobs - disabled in development
auditVerify:
  enabled: false
  schedule: "*/15 * * * *"

securityVerify:
  enabled: false
  schedule: "*/15 * * * *"

frozenHistoryVerify:
  enabled: false
  schedule: "0 4 * * *"

canonicalReplay:
  enabled: false
  schedule: "0 * * * *"

capabilitySweep:
  enabled: false
  schedule: "0 3 * * *"

knowledgeRefresh:
  enabled: false
  schedule: "0 5 * * 1"
  corpusPath: "/corpus"

atlasSurveillance:
  enabled: false
  schedule: "*/30 * * * *"

taarCronJobs:
  enabled: false
  facilityMode: "GREEN"

arbiterHeartbeat:
  enabled: false
  schedule: "0 * * * *"

rlpRefresh:
  enabled: false
  probeSchedule: "0 */6 * * *"
  sgcSchedule: "0 0 * * *"

# Ingress - disabled in development
ingress:
  enabled: false

# API gateway
api:
  image: project-ai-development-api
  port: 8000
  env:
    PROJECT_AI_INSTANCE_NAME: PROJECT-AI-LOCAL
    PROJECT_AI_API_TOKEN: ""
    PROJECT_AI_MACHINE_CREDENTIALS_REQUIRED: "false"
    PROJECT_AI_AUDIT_PATH: /data/chimera-audit.jsonl
    PROJECT_AI_DOI_REGISTRY: /app/docs/reference/DOI_REGISTRY.md
    PROJECT_AI_ACCOUNT_DB: /data/accounts.db
    PROJECT_AI_WORKFLOW_DB: /data/workflows.db
    PROJECT_AI_SWR_BUNDLE_DIR: /data/swr-bundles
    PROJECT_AI_SESSION_COOKIE_SECURE: "false"
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# Documentation portal
docsPortal:
  image: project-ai-development-docs-portal
  port: 8080
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

# Proof portal
proofPortal:
  image: project-ai-development-proof-portal
  port: 8080
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

operatorConsole:
  image: project-ai-development-operator-console
  port: 8080
  resources:
    requests:
      cpu: 20m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# SWR read-only adapter
swr:
  image: project-ai-development-swr
  port: 8000
  resources:
    requests:
      cpu: 20m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# Atlas read-only adapter
atlas:
  image: project-ai-development-atlas
  port: 8000
  resources:
    requests:
      cpu: 20m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# Arbiter/RLP experimental adapter
arbiterRlp:
  image: project-ai-development-arbiter-rlp
  port: 8000
  resources:
    requests:
      cpu: 20m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# Genesis evidence emitter
genesis:
  image: project-ai-development-genesis
  port: 8080
  resources:
    requests:
      cpu: 10m
      memory: 16Mi
    limits:
      cpu: 100m
      memory: 32Mi
