# Development values — not for production use.
# Images are built locally by `docker compose build`.
# For production, use: helm/values.prod.yaml

image:
  registry: ""
  owner: ""
  tag: ""
  pullPolicy: IfNotPresent

# Kubernetes Secrets for development (optional)
secrets:
  create: false  # Development uses local environment variables
  api:
    token: ""  # Not used in development

# Storage - disabled in development (uses emptyDir)
persistence:
  enabled: false
  storageClass: "standard"
  size: 1Gi
  audit:
    enabled: false
    size: 1Gi
    path: /data

# RBAC - disabled in development (optional, uses default SA)
rbac:
  create: false  # Development uses default ServiceAccount
  api:
    watchPods: false  # API does not need pod discovery

# Network Policies - disabled in development
networkPolicy:
  enabled: false  # Development allows all traffic

# Pod Disruption Budgets - disabled in development
podDisruptionBudgets:
  enabled: false

# Monitoring - disabled in development
monitoring:
  enabled: false

# Alerting - disabled in development
alerting:
  enabled: false

# Backup - disabled in development
backup:
  enabled: false
  schedule: "0 2 * * *"
  retentionDays: 30
  image: "busybox:1.36.1"
  # Remote upload is off by default everywhere: it requires an operator-provided
  # rclone config Secret (see backup.remote.secretName) mounted at
  # /remote-config/rclone.conf. With remote.enabled=false, the CronJob only
  # writes/prunes local tar.gz archives on the backup PVC. Not exercised
  # against a live cluster or a real remote target — verify in a real
  # environment before relying on it.
  remote:
    enabled: false
    destination: ""  # e.g. "s3:my-bucket/project-ai-backups"
    secretName: ""   # defaults to "<release>-backup-remote" if unset

# CronJobs - disabled in development
auditVerify:
  enabled: false
  schedule: "*/15 * * * *"

securityVerify:
  enabled: false
  schedule: "*/15 * * * *"

frozenHistoryVerify:
  enabled: false
  schedule: "0 4 * * *"

canonicalReplay:
  enabled: false
  schedule: "0 * * * *"

capabilitySweep:
  enabled: false
  schedule: "0 3 * * *"

knowledgeRefresh:
  enabled: false
  schedule: "0 5 * * 1"
  corpusPath: "/corpus"

atlasSurveillance:
  enabled: false
  schedule: "*/30 * * * *"

taarCronJobs:
  enabled: false
  facilityMode: "GREEN"

arbiterHeartbeat:
  enabled: false
  schedule: "0 * * * *"

rlpRefresh:
  enabled: false
  probeSchedule: "0 */6 * * *"
  sgcSchedule: "0 0 * * *"

# Ingress - disabled in development
ingress:
  enabled: false

# API gateway
api:
  image: project-ai-development-api
  port: 8000
  env:
    PROJECT_AI_API_TOKEN: ""
    PROJECT_AI_AUDIT_PATH: /data/chimera-audit.jsonl
    PROJECT_AI_DOI_REGISTRY: /app/docs/reference/DOI_REGISTRY.md
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# Documentation portal
docsPortal:
  image: project-ai-development-docs-portal
  port: 8080
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

# Proof portal
proofPortal:
  image: project-ai-development-proof-portal
  port: 8080
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

# SWR read-only adapter
swr:
  image: project-ai-development-swr
  port: 8000
  resources:
    requests:
      cpu: 20m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# Atlas read-only adapter
atlas:
  image: project-ai-development-atlas
  port: 8000
  resources:
    requests:
      cpu: 20m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# Arbiter/RLP experimental adapter
arbiterRlp:
  image: project-ai-development-arbiter-rlp
  port: 8000
  resources:
    requests:
      cpu: 20m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# Genesis evidence emitter
genesis:
  image: project-ai-development-genesis
  port: 8080
  resources:
    requests:
      cpu: 10m
      memory: 16Mi
    limits:
      cpu: 100m
      memory: 32Mi
