{{- if and .Values.monitoring.enabled .Values.monitoring.grafanaDashboard.enabled }}
---
# Dashboard discovery ConfigMap for an externally operated Grafana sidecar.
# The chart deliberately does not deploy its own Prometheus/Grafana/Loki stack:
# production observability ownership, persistence, HA, authentication, and
# receiver routing belong to the cluster monitoring platform.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-grafana-dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "project-ai.labels" . | nindent 4 }}
    {{- with .Values.monitoring.grafanaDashboard.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
data:
  project-ai.json: |-
    {
      "annotations": {"list": []},
      "editable": false,
      "panels": [
        {
          "type": "stat",
          "title": "Release build",
          "targets": [{"expr": "project_ai_build_info{namespace=\"{{ .Release.Namespace }}\"}"}]
        },
        {
          "type": "timeseries",
          "title": "API requests per second",
          "targets": [{"expr": "sum(rate(project_ai_http_requests_total{namespace=\"{{ .Release.Namespace }}\"}[5m]))"}]
        },
        {
          "type": "timeseries",
          "title": "API 5xx ratio",
          "targets": [{"expr": "sum(rate(project_ai_http_requests_total{namespace=\"{{ .Release.Namespace }}\",status_code=~\"5..\"}[5m])) / clamp_min(sum(rate(project_ai_http_requests_total{namespace=\"{{ .Release.Namespace }}\"}[5m])), 0.001)"}]
        },
        {
          "type": "timeseries",
          "title": "API p99 latency",
          "targets": [{"expr": "histogram_quantile(0.99, sum by (le) (rate(project_ai_http_request_duration_seconds_bucket{namespace=\"{{ .Release.Namespace }}\"}[5m])))"}]
        },
        {
          "type": "timeseries",
          "title": "Ready API replicas",
          "targets": [{"expr": "kube_deployment_status_replicas_available{namespace=\"{{ .Release.Namespace }}\",deployment=\"{{ .Release.Name }}-api\"}"}]
        },
        {
          "type": "timeseries",
          "title": "PVC utilization",
          "targets": [{"expr": "kubelet_volume_stats_used_bytes{namespace=\"{{ .Release.Namespace }}\",persistentvolumeclaim=~\"{{ .Release.Name }}-.*\"} / kubelet_volume_stats_capacity_bytes{namespace=\"{{ .Release.Namespace }}\",persistentvolumeclaim=~\"{{ .Release.Name }}-.*\"}"}]
        }
      ],
      "schemaVersion": 39,
      "tags": ["project-ai", "governance"],
      "templating": {"list": []},
      "time": {"from": "now-1h", "to": "now"},
      "title": "Project-AI Production Operations",
      "uid": "project-ai-production",
      "version": 1
    }
{{- end }}
