{{- if .Values.ingress.enabled }}
---
# Ingress for public-facing services (portals)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-public
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "project-ai.labels" . | nindent 4 }}
    app.kubernetes.io/component: ingress
  {{- if .Values.ingress.annotations }}
  annotations:
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- toYaml .Values.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          - path: /docs
            pathType: Prefix
            backend:
              service:
                name: {{ $.Release.Name }}-docs-portal
                port:
                  number: {{ $.Values.docsPortal.port }}
          - path: /proof
            pathType: Prefix
            backend:
              service:
                name: {{ $.Release.Name }}-proof-portal
                port:
                  number: {{ $.Values.proofPortal.port }}
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ $.Release.Name }}-api
                port:
                  number: {{ $.Values.api.port }}
    {{- end }}
{{- end }}
