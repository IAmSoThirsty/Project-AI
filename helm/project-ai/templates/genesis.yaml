apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-genesis
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "project-ai.labels" . | nindent 4 }}
    {{- include "project-ai.selectorLabels" (dict "root" . "component" "genesis") | nindent 4 }}
spec:
  replicas: {{ .Values.genesis.replicas | default 1 }}
  selector:
    matchLabels:
      {{- include "project-ai.selectorLabels" (dict "root" . "component" "genesis") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "project-ai.labels" . | nindent 8 }}
        {{- include "project-ai.selectorLabels" (dict "root" . "component" "genesis") | nindent 8 }}
    spec:
      automountServiceAccountToken: false
      {{- if .Values.rbac.create }}
      serviceAccountName: {{ .Release.Name }}-genesis
      {{- end }}
      securityContext:
        {{- include "project-ai.podSecurityContext" . | nindent 8 }}
      containers:
        - name: genesis
          image: {{ include "project-ai.image" (dict "root" . "name" "genesis") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["genesis-emitter", "serve", "0.0.0.0:{{ .Values.genesis.port }}"]
          ports:
            - containerPort: {{ .Values.genesis.port }}
              protocol: TCP
          livenessProbe:
            exec:
              command: ["genesis-emitter", "health"]
            initialDelaySeconds: 3
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["genesis-emitter", "health"]
            initialDelaySeconds: 2
            periodSeconds: 5
          securityContext:
            {{- include "project-ai.securityContext" . | nindent 12 }}
          resources:
            {{- toYaml .Values.genesis.resources | nindent 12 }}
          volumeMounts:
            {{- include "project-ai.tmpVolumeMount" . | nindent 12 }}
      volumes:
        {{- include "project-ai.tmpVolume" . | nindent 8 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-genesis
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "project-ai.labels" . | nindent 4 }}
    {{- include "project-ai.selectorLabels" (dict "root" . "component" "genesis") | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "project-ai.selectorLabels" (dict "root" . "component" "genesis") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.genesis.port }}
      targetPort: {{ .Values.genesis.port }}
      protocol: TCP
