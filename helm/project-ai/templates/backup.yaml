{{- if .Values.backup.enabled }}
---
# CronJob for automated backups
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Release.Name }}-backup
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "project-ai.labels" . | nindent 4 }}
    app.kubernetes.io/component: backup
spec:
  schedule: {{ .Values.backup.schedule | quote }}
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            {{- include "project-ai.labels" . | nindent 12 }}
            app.kubernetes.io/component: backup
        spec:
          serviceAccountName: {{ .Release.Name }}-backup
          automountServiceAccountToken: false
          securityContext:
            {{- include "project-ai.podSecurityContext" . | nindent 12 }}
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: {{ .Values.backup.image | default "dhi.io/busybox:1-alpine3.24" }}
              imagePullPolicy: {{ .Values.backup.imagePullPolicy | default "IfNotPresent" }}
              command:
                - /bin/sh
                - -c
                - |
                  set -eu
                  echo "Starting backup at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
                  archive="/backup/audit-$(date -u +%Y%m%d-%H%M%S).tar.gz"
                  tar czf "$archive" -C /data .
                  echo "Wrote $archive ($(du -h "$archive" | cut -f1))"

                  retention_days={{ .Values.backup.retentionDays | default 30 }}
                  echo "Pruning local backups older than ${retention_days} days"
                  find /backup -maxdepth 1 -name 'audit-*.tar.gz' -mtime "+${retention_days}" -print -delete

                  {{- if .Values.backup.remote.enabled }}
                  if [ -f /remote-config/rclone.conf ]; then
                    echo "Uploading $archive to remote:{{ .Values.backup.remote.destination }}"
                    rclone --config /remote-config/rclone.conf copy "$archive" "{{ .Values.backup.remote.destination }}"
                  else
                    echo "backup.remote.enabled=true but /remote-config/rclone.conf is missing; skipping remote upload" >&2
                    exit 1
                  fi
                  {{- else }}
                  echo "Remote upload disabled (backup.remote.enabled=false); local PVC copy only"
                  {{- end }}

                  echo "Backup completed at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
              volumeMounts:
                - name: audit-data
                  mountPath: /data
                  readOnly: true
                - name: backup-storage
                  mountPath: /backup
                {{- if .Values.backup.remote.enabled }}
                - name: remote-config
                  mountPath: /remote-config
                  readOnly: true
                {{- end }}
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
              securityContext:
                {{- include "project-ai.securityContext" . | nindent 16 }}
          volumes:
            - name: audit-data
              persistentVolumeClaim:
                claimName: {{ .Release.Name }}-audit-data-pvc
                readOnly: true
            - name: backup-storage
              persistentVolumeClaim:
                claimName: {{ .Release.Name }}-backup-pvc
            {{- if .Values.backup.remote.enabled }}
            - name: remote-config
              secret:
                secretName: {{ .Values.backup.remote.secretName | default (printf "%s-backup-remote" .Release.Name) }}
                optional: false
            {{- end }}

---
# ServiceAccount for backup job
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-backup
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "project-ai.labels" . | nindent 4 }}
{{- end }}
