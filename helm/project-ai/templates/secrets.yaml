{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-api-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "project-ai.labels" . | nindent 4 }}
    {{- include "project-ai.selectorLabels" (dict "root" . "component" "api") | nindent 4 }}
type: Opaque
stringData:
  PROJECT_AI_API_TOKEN: {{ .Values.secrets.api.token | quote }}
  PROJECT_AI_SETUP_SECRET: {{ .Values.secrets.api.setupSecret | quote }}
  PROJECT_AI_MFA_KEY: {{ .Values.secrets.api.mfaKey | quote }}
  PROJECT_AI_DATABASE_URL: {{ .Values.secrets.api.databaseUrl | quote }}
  PROJECT_AI_EXECUTION_SECRET: {{ .Values.secrets.api.executionSecret | quote }}
{{- end }}
