apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-api
  labels:
    {{- include "project-ai.labels" . | nindent 4 }}
    {{- include "project-ai.selectorLabels" (dict "root" . "component" "api") | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicas | default 1 }}
  selector:
    matchLabels:
      {{- include "project-ai.selectorLabels" (dict "root" . "component" "api") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "project-ai.labels" . | nindent 8 }}
        {{- include "project-ai.selectorLabels" (dict "root" . "component" "api") | nindent 8 }}
    spec:
      {{- if .Values.rbac.create }}
      serviceAccountName: {{ .Release.Name }}-api
      {{- end }}
      securityContext:
        {{- include "project-ai.podSecurityContext" . | nindent 8 }}
      containers:
        - name: api
          image: {{ include "project-ai.image" (dict "root" . "name" "api") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.api.port }}
              protocol: TCP
          env:
            - name: PROJECT_AI_INSTANCE_NAME
              value: {{ .Values.api.env.PROJECT_AI_INSTANCE_NAME | quote }}
            - name: PROJECT_AI_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-api-secrets
                  key: PROJECT_AI_API_TOKEN
                  optional: {{ .Values.secrets.create | ternary "false" "true" }}
            - name: PROJECT_AI_AUDIT_PATH
              value: {{ .Values.api.env.PROJECT_AI_AUDIT_PATH | quote }}
            - name: PROJECT_AI_DOI_REGISTRY
              value: {{ .Values.api.env.PROJECT_AI_DOI_REGISTRY | quote }}
            - name: PROJECT_AI_ACCOUNT_DB
              value: {{ .Values.api.env.PROJECT_AI_ACCOUNT_DB | quote }}
            - name: PROJECT_AI_WORKFLOW_DB
              value: {{ .Values.api.env.PROJECT_AI_WORKFLOW_DB | quote }}
            - name: PROJECT_AI_SWR_BUNDLE_DIR
              value: {{ .Values.api.env.PROJECT_AI_SWR_BUNDLE_DIR | quote }}
            - name: PROJECT_AI_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-api-secrets
                  key: PROJECT_AI_DATABASE_URL
                  optional: {{ .Values.secrets.create | ternary "false" "true" }}
            - name: PROJECT_AI_SESSION_COOKIE_SECURE
              value: {{ .Values.api.env.PROJECT_AI_SESSION_COOKIE_SECURE | quote }}
            - name: PROJECT_AI_SETUP_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-api-secrets
                  key: PROJECT_AI_SETUP_SECRET
                  optional: {{ .Values.secrets.create | ternary "false" "true" }}
            - name: PROJECT_AI_MFA_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-api-secrets
                  key: PROJECT_AI_MFA_KEY
                  optional: {{ .Values.secrets.create | ternary "false" "true" }}
            - name: PROJECT_AI_EXECUTION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-api-secrets
                  key: PROJECT_AI_EXECUTION_SECRET
                  optional: {{ .Values.secrets.create | ternary "false" "true" }}
          livenessProbe:
            httpGet:
              path: /health/live
              port: {{ .Values.api.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/live
              port: {{ .Values.api.port }}
            initialDelaySeconds: 3
            periodSeconds: 5
          securityContext:
            {{- include "project-ai.securityContext" . | nindent 12 }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          volumeMounts:
            {{- include "project-ai.tmpVolumeMount" . | nindent 12 }}
            - name: audit-data
              mountPath: /data
      volumes:
        {{- include "project-ai.tmpVolume" . | nindent 8 }}
        - name: audit-data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-audit-data-pvc
          {{- else }}
          emptyDir: {}
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-api
  labels:
    {{- include "project-ai.labels" . | nindent 4 }}
    {{- include "project-ai.selectorLabels" (dict "root" . "component" "api") | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "project-ai.selectorLabels" (dict "root" . "component" "api") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.api.port }}
      targetPort: {{ .Values.api.port }}
      protocol: TCP
