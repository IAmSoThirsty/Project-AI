{{- range list
  (dict "name" "docs-portal" "key" "docsPortal" "values" .Values.docsPortal)
  (dict "name" "proof-portal" "key" "proofPortal" "values" .Values.proofPortal)
  (dict "name" "operator-console" "key" "operatorConsole" "values" .Values.operatorConsole)
}}
{{- $svc := .values }}
{{- $component := .name }}
{{- $root := $ }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $root.Release.Name }}-{{ $component }}
  labels:
    {{- include "project-ai.labels" $root | nindent 4 }}
    {{- include "project-ai.selectorLabels" (dict "root" $root "component" $component) | nindent 4 }}
spec:
  replicas: {{ $svc.replicas | default 1 }}
  selector:
    matchLabels:
      {{- include "project-ai.selectorLabels" (dict "root" $root "component" $component) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "project-ai.labels" $root | nindent 8 }}
        {{- include "project-ai.selectorLabels" (dict "root" $root "component" $component) | nindent 8 }}
    spec:
      {{- if $root.Values.rbac.create }}
      serviceAccountName: {{ $root.Release.Name }}-portals
      {{- end }}
      securityContext:
        {{- include "project-ai.podSecurityContext" $root | nindent 8 }}
      containers:
        - name: {{ $component }}
          image: {{ include "project-ai.image" (dict "root" $root "name" $component) }}
          imagePullPolicy: {{ $root.Values.image.pullPolicy }}
          ports:
            - containerPort: {{ $svc.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ $svc.port }}
            initialDelaySeconds: 3
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ $svc.port }}
            initialDelaySeconds: 2
            periodSeconds: 5
          securityContext:
            {{- include "project-ai.securityContext" $root | nindent 12 }}
          resources:
            {{- toYaml $svc.resources | nindent 12 }}
          volumeMounts:
            {{- include "project-ai.tmpVolumeMount" $root | nindent 12 }}
      volumes:
        {{- include "project-ai.tmpVolume" $root | nindent 8 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $root.Release.Name }}-{{ $component }}
  labels:
    {{- include "project-ai.labels" $root | nindent 4 }}
    {{- include "project-ai.selectorLabels" (dict "root" $root "component" $component) | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "project-ai.selectorLabels" (dict "root" $root "component" $component) | nindent 4 }}
  ports:
    - name: http
      port: {{ $svc.port }}
      targetPort: {{ $svc.port }}
      protocol: TCP
{{- end }}
