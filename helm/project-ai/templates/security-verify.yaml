{{- if .Values.securityVerify.enabled }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Release.Name }}-security-verify
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "project-ai.labels" . | nindent 4 }}
    app.kubernetes.io/component: security-verify
spec:
  schedule: "{{ .Values.securityVerify.schedule | default "*/15 * * * *" }}"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 600
      backoffLimit: 2
      template:
        metadata:
          labels:
            {{- include "project-ai.labels" . | nindent 12 }}
            app.kubernetes.io/component: security-verify
        spec:
          automountServiceAccountToken: false
          restartPolicy: OnFailure
          securityContext:
            {{- include "project-ai.podSecurityContext" . | nindent 12 }}
          containers:
            - name: security-verify
              image: {{ include "project-ai.image" (dict "root" . "name" "api") }}
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              command:
                - python
                - tools/verify_security_relay.py
                - /data/chimera-audit.jsonl
              env:
                - name: PROJECT_AI_AUDIT_PATH
                  value: /data/chimera-audit.jsonl
              volumeMounts:
                - name: audit-data
                  mountPath: /data
                  readOnly: true
                {{- include "project-ai.tmpVolumeMount" . | nindent 16 }}
              securityContext:
                {{- include "project-ai.securityContext" . | nindent 16 }}
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  cpu: 200m
                  memory: 256Mi
          volumes:
            - name: audit-data
              persistentVolumeClaim:
                claimName: {{ .Release.Name }}-audit-data-pvc
                readOnly: true
            {{- include "project-ai.tmpVolume" . | nindent 12 }}
{{- end }}
