{{- if .Values.alerting.enabled }}
---
# PrometheusRule for alerting (requires prometheus-operator)
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "project-ai.labels" . | nindent 4 }}
    {{- with .Values.alerting.prometheusRule.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  groups:
    - name: project-ai.rules
      interval: 30s
      rules:
        - alert: ProjectAIMetricsAbsent
          expr: absent(project_ai_build_info{namespace="{{ .Release.Namespace }}"}) == 1
          for: 5m
          labels:
            severity: critical
            component: api
          annotations:
            summary: "Project-AI metrics are absent"
            description: "No Project-AI build metric has been scraped for five minutes"

        - alert: ProjectAIAPIUnavailable
          expr: kube_deployment_status_replicas_available{namespace="{{ .Release.Namespace }}", deployment="{{ .Release.Name }}-api"} < kube_deployment_spec_replicas{namespace="{{ .Release.Namespace }}", deployment="{{ .Release.Name }}-api"}
          for: 5m
          labels:
            severity: critical
            component: api
          annotations:
            summary: "Project-AI API has unavailable replicas"
            description: "Available API replicas are below the declared deployment replica count"

        # Alert: High error rate
        - alert: ProjectAIHighErrorRate
          expr: 'sum(rate(project_ai_http_requests_total{namespace="{{ .Release.Namespace }}", status_code=~"5.."}[5m])) / clamp_min(sum(rate(project_ai_http_requests_total{namespace="{{ .Release.Namespace }}"}[5m])), 0.001) > 0.05'
          for: 5m
          labels:
            severity: warning
            component: api
          annotations:
            summary: "High API error rate"
            description: "Error rate > 5% for 5 minutes"

        # Alert: High latency
        - alert: ProjectAIHighLatency
          expr: 'histogram_quantile(0.99, sum by (le) (rate(project_ai_http_request_duration_seconds_bucket{namespace="{{ .Release.Namespace }}"}[5m]))) > 1'
          for: 5m
          labels:
            severity: warning
            component: api
          annotations:
            summary: "High API latency"
            description: "p99 latency > 1s for 5 minutes"

        # Alert: PVC usage high
        - alert: ProjectAIPVCAlmostFull
          expr: 'kubelet_volume_stats_used_bytes{namespace="{{ .Release.Namespace }}", persistentvolumeclaim=~"{{ .Release.Name }}-.*"} / kubelet_volume_stats_capacity_bytes{namespace="{{ .Release.Namespace }}", persistentvolumeclaim=~"{{ .Release.Name }}-.*"} > 0.80'
          for: 5m
          labels:
            severity: warning
            component: storage
          annotations:
            summary: "Project-AI PVC > 80% full"
            description: 'PVC {{ "{{$labels.persistentvolumeclaim}}" }} usage > 80%'

        # Alert: Pod restart rate high
        - alert: ProjectAIPodRestartingTooOften
          expr: 'increase(kube_pod_container_status_restarts_total{namespace="{{ .Release.Namespace }}", pod=~"{{ .Release.Name }}-.*"}[15m]) > 3'
          for: 5m
          labels:
            severity: warning
            component: pod
          annotations:
            summary: "Pod restarting frequently"
            description: 'Pod {{ "{{$labels.pod}}" }} restarted more than three times in 15 minutes'

        - alert: ProjectAIGovernanceVerificationFailed
          expr: 'kube_job_status_failed{namespace="{{ .Release.Namespace }}", job_name=~"{{ .Release.Name }}-(audit-verify|security-verify|canonical-replay|frozen-history-verify)-.*"} > 0'
          for: 1m
          labels:
            severity: critical
            component: governance-verification
          annotations:
            summary: "Project-AI scheduled governance verification failed"
            description: 'Verification job {{ "{{$labels.job_name}}" }} reported a failure'
{{- end }}
