{{- if .Values.alerting.enabled }}
---
# PrometheusRule for alerting (requires prometheus-operator)
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "project-ai.labels" . | nindent 4 }}
    prometheus: kube-prometheus
spec:
  groups:
    - name: project-ai.rules
      interval: 30s
      rules:
        # Alert: API pod down
        - alert: ProjectAIPodDown
          expr: kube_pod_status_phase{namespace="{{ .Release.Namespace }}", pod=~"{{ .Release.Name }}-api.*", phase!="Running"} == 1
          for: 5m
          labels:
            severity: critical
            component: api
          annotations:
            summary: "Project-AI API pod down"
            description: 'API pod {{ "{{$labels.pod}}" }} is not running'

        # Alert: High error rate
        - alert: ProjectAIHighErrorRate
          expr: 'rate(http_requests_total{job="project-ai", status=~"5.."}[5m]) > 0.05'
          for: 5m
          labels:
            severity: warning
            component: api
          annotations:
            summary: "High API error rate"
            description: "Error rate > 5% for 5 minutes"

        # Alert: High latency
        - alert: ProjectAIHighLatency
          expr: 'histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m])) > 1'
          for: 5m
          labels:
            severity: warning
            component: api
          annotations:
            summary: "High API latency"
            description: "p99 latency > 1s for 5 minutes"

        # Alert: PVC usage high
        - alert: ProjectAIPVCAlmostFull
          expr: 'kubelet_volume_stats_used_bytes{persistentvolumeclaim=~"{{ .Release.Name }}-.*"} / kubelet_volume_stats_capacity_bytes > 0.80'
          for: 5m
          labels:
            severity: warning
            component: storage
          annotations:
            summary: "Project-AI PVC > 80% full"
            description: 'PVC {{ "{{$labels.persistentvolumeclaim}}" }} usage > 80%'

        # Alert: Pod restart rate high
        - alert: ProjectAIPodRestartingTooOften
          expr: 'rate(kube_pod_container_status_restarts_total{namespace="{{ .Release.Namespace }}"}[1h]) > 0.1'
          for: 5m
          labels:
            severity: warning
            component: pod
          annotations:
            summary: "Pod restarting frequently"
            description: 'Pod {{ "{{$labels.pod}}" }} restarting > 0.1 times/hour'
{{- end }}
