{{- if .Values.networkPolicy.enabled }}
---
# NetworkPolicy for API service: accepts only ingress, internal consumers, and monitoring.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "project-ai.labels" . | nindent 4 }}
    {{- include "project-ai.selectorLabels" (dict "root" . "component" "api") | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "project-ai.selectorLabels" (dict "root" . "component" "api") | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow from portals (read-only access)
    - from:
        - podSelector:
            matchExpressions:
              - key: app.kubernetes.io/component
                operator: In
                values: [docs-portal, proof-portal, operator-console]
      ports:
        - protocol: TCP
          port: {{ .Values.api.port }}
    # Allow from adapters (read-only access)
    - from:
        - podSelector:
            matchExpressions:
              - key: app.kubernetes.io/component
                operator: In
                values: [swr, atlas, arbiter-rlp]
      ports:
        - protocol: TCP
          port: {{ .Values.api.port }}
    # Allow the ingress controller to route /api.
    - from:
        - namespaceSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.ingressController.namespaceLabels | nindent 14 }}
          podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.ingressController.podLabels | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.api.port }}
    {{- if .Values.monitoring.enabled }}
    # Allow only the configured Prometheus pods to scrape /metrics.
    - from:
        - namespaceSelector:
            matchLabels:
              {{- toYaml .Values.monitoring.networkPolicy.namespaceLabels | nindent 14 }}
          podSelector:
            matchLabels:
              {{- toYaml .Values.monitoring.networkPolicy.podLabels | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.api.port }}
    {{- end }}
  egress:
    # Allow to any pod (for outbound service calls)
    - to:
        - podSelector: {}
    # Allow DNS
    - to:
        - namespaceSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.dns.namespaceLabels | nindent 14 }}
          podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.dns.podLabels | nindent 14 }}
      ports:
        - protocol: UDP
          port: 53

---
# NetworkPolicy for portals: accept only ingress-controller traffic and call the API.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-portals
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "project-ai.labels" . | nindent 4 }}
    app.kubernetes.io/component: portals
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/component
        operator: In
        values: [docs-portal, proof-portal, operator-console]
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic only from the ingress controller namespace/pods.
    - from:
        - namespaceSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.ingressController.namespaceLabels | nindent 14 }}
          podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.ingressController.podLabels | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.docsPortal.port }}
  egress:
    # Allow to API service
    - to:
        - podSelector:
            matchLabels:
              {{- include "project-ai.selectorLabels" (dict "root" . "component" "api") | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.api.port }}
    # Allow DNS
    - to:
        - namespaceSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.dns.namespaceLabels | nindent 14 }}
          podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.dns.podLabels | nindent 14 }}
      ports:
        - protocol: UDP
          port: 53

---
# NetworkPolicy for adapters: accept from API only, no ingress from outside.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-adapters
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "project-ai.labels" . | nindent 4 }}
    app.kubernetes.io/component: adapters
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/component
        operator: In
        values: [swr, atlas, arbiter-rlp]
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow from API only
    - from:
        - podSelector:
            matchLabels:
              {{- include "project-ai.selectorLabels" (dict "root" . "component" "api") | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.swr.port }}
  egress:
    # Allow DNS
    - to:
        - namespaceSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.dns.namespaceLabels | nindent 14 }}
          podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.dns.podLabels | nindent 14 }}
      ports:
        - protocol: UDP
          port: 53

---
# NetworkPolicy for genesis: allow API access only (read-only event stream)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-genesis
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "project-ai.labels" . | nindent 4 }}
    {{- include "project-ai.selectorLabels" (dict "root" . "component" "genesis") | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "project-ai.selectorLabels" (dict "root" . "component" "genesis") | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow from API only (read event stream)
    - from:
        - podSelector:
            matchLabels:
              {{- include "project-ai.selectorLabels" (dict "root" . "component" "api") | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.genesis.port }}
  egress:
    # Allow DNS
    - to:
        - namespaceSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.dns.namespaceLabels | nindent 14 }}
          podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.dns.podLabels | nindent 14 }}
      ports:
        - protocol: UDP
          port: 53
{{- end }}
