[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "project-ai"
version = "1.0.0"
description = "A constitutionally governed, sovereign-grade AI platform with cryptographic audit trails and enforced ethical behavior"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
authors = [{name = "Project AI Team"}]
keywords = ["ai", "assistant", "pyqt6", "machine-learning", "constitutional-ai", "asimov-laws", "cryptographic-audit", "ethical-ai", "open-source", "governance"]
dynamic = []

classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "Intended Audience :: End Users/Desktop",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Operating System :: Microsoft :: Windows",
    "Operating System :: MacOS",
    "Operating System :: POSIX :: Linux",
    "Operating System :: Android",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: JavaScript",
    "Programming Language :: Java",
    "Programming Language :: Rust",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Desktop Environment",
    "Topic :: Software Development :: Libraries :: Application Frameworks",
]

dependencies = [
    # Web frameworks
    "Flask>=3.0.0",
    "fastapi>=0.109.1",
    "uvicorn[standard]>=0.27.0",
    # AI / ML
    "scikit-learn>=1.0.0",
    "openai>=1.0.0",
    "numpy>=1.20.0",
    "pandas>=1.0.0",
    "matplotlib>=3.5.0",
    # Security & Crypto
    "cryptography>=42.0.4",
    "passlib>=1.7.0",
    "bcrypt>=5.0.0",
    "defusedxml>=0.7.0",
    # HTTP / Networking
    "requests>=2.31.0",
    "httpx>=0.24.0",
    # Data & Config
    "pydantic>=2.0.0",
    "python-dotenv>=0.19.0",
    "PyYAML>=6.0.0",
    "PyPDF2>=3.0.0",
    # Infrastructure
    "typer>=0.9.0",
    "temporalio>=1.5.0",
    "protobuf>=4.0.0",
    # Geo
    "geopy>=2.0.0",
    # Desktop GUI
    "PyQt6>=6.4.0",
]

[project.scripts]
taar = "taar.cli:cli_main"

[project.optional-dependencies]
dev = [
    "ruff>=0.3.0",
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
    "pytest-timeout>=2.2.0",
    "mypy>=1.8.0",
    "bandit[toml]>=1.7.0",
    "pre-commit>=3.6.0",
]
taar = [
    "rich>=13.0.0",
    "watchdog>=3.0.0",
]

[project.urls]
Homepage = "https://github.com/IAmSoThirsty/Project-AI"
Repository = "https://github.com/IAmSoThirsty/Project-AI"
Issues = "https://github.com/IAmSoThirsty/Project-AI/issues"

[tool.ruff]
# Exclude markdown documentation files from linting
exclude = [
    "*.md",
    "node_modules",
    ".venv",
    "venv",
    "__pycache__",
    ".git",
    "build",
    "dist"
]

# Line length for black compatibility
line-length = 88

# Target Python version
target-version = "py312"

[tool.ruff.lint]
# Select rules to check
select = [
    "E",      # Errors
    "W",      # Warnings
    "F",      # Pyflakes
    "I",      # isort
    "N",      # pep8-naming
    "UP",     # pyupgrade
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "SIM",    # flake8-simplify
]

# Ignore specific rules
ignore = [
    "E501",   # Line too long (handled by formatter)
    "D",      # Skip all pydocstyle rules for now
    "SIM105", # Suppress contextlib suggestions
    "N807",   # __init__ in documentation examples (INTEGRATION_GUIDE.py)
    "N802",   # eventFilter is a PyQt6 method name that can't be changed
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
python_files = "test_*.py"
addopts = "-v --tb=short --strict-markers"
markers = [
    "unit: Unit tests",
    "integration: Integration tests",
    "load: Load tests",
    "chaos: Chaos tests",
    "soak: Soak tests",
]
filterwarnings = [
    "ignore::DeprecationWarning:passlib",
]

# NOTE: Black is no longer used. Ruff handles formatting via 'ruff format'.
